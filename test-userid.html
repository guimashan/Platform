<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取得 LINE User ID</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #c23636;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .btn-line {
            display: inline-block;
            background: #00C300;
            color: white;
            padding: 15px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 20px 0;
            transition: all 0.3s;
        }

        .btn-line:hover {
            background: #00B000;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 195, 0, 0.4);
        }

        .info {
            color: #666;
            font-size: 0.9rem;
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 取得 LINE User ID</h1>
        
        <div id="loginSection">
            <p>點擊下方按鈕使用 LINE 登入</p>
            <a href="#" id="loginBtn" class="btn-line">使用 LINE 登入</a>
            <div class="info">
                ⚠️ 登入後將自動顯示您的 LINE User ID<br>
                這是用來設定系統管理員的必要資訊
            </div>
        </div>
    </div>

    <script>
        // LINE Login 設定 - 使用正確的 Callback URL
        const LINE_LOGIN_CHANNEL_ID = '2008269293';
        const CALLBACK_URL = 'https://guimashen.vercel.app/auth/callback';
        const STATE = 'test_userid';

        // 登入按鈕
        document.getElementById('loginBtn').addEventListener('click', function(e) {
            e.preventDefault();
            lineLogin();
        });

        // LINE Login
        function lineLogin() {
            const lineAuthUrl = `https://access.line.me/oauth2/v2.1/authorize?` +
                `response_type=code` +
                `&client_id=${LINE_LOGIN_CHANNEL_ID}` +
                `&redirect_uri=${encodeURIComponent(CALLBACK_URL)}` +
                `&state=${STATE}` +
                `&scope=profile%20openid`;
            
            window.location.href = lineAuthUrl;
        }
    </script>
</body>
</html>
