<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取得 LINE User ID</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #c23636;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .btn-line {
            display: inline-block;
            background: #00C300;
            color: white;
            padding: 15px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 20px 0;
            transition: all 0.3s;
        }

        .btn-line:hover {
            background: #00B000;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 195, 0, 0.4);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .user-id {
            background: #333;
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.9rem;
            word-break: break-all;
            margin: 15px 0;
        }

        .copy-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        .copy-btn:hover {
            background: #45a049;
        }

        .info {
            color: #666;
            font-size: 0.9rem;
            margin-top: 20px;
            line-height: 1.6;
        }

        .loading {
            display: none;
        }

        .loading.show {
            display: block;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 取得 LINE User ID</h1>
        
        <div id="loginSection">
            <p>點擊下方按鈕使用 LINE 登入</p>
            <a href="#" id="loginBtn" class="btn-line">使用 LINE 登入</a>
            <div class="info">
                ⚠️ 登入後將自動顯示您的 LINE User ID<br>
                這是用來設定系統管理員的必要資訊
            </div>
        </div>

        <div id="loadingSection" class="loading">
            <div class="spinner"></div>
            <p>正在取得您的資料...</p>
        </div>

        <div id="resultSection" class="result">
            <h2>✅ 您的 LINE User ID</h2>
            <div class="user-id" id="userId"></div>
            <button class="copy-btn" onclick="copyUserId()">📋 複製 User ID</button>
            <div class="info">
                請將這個 ID 複製並提供給系統管理員<br>
                用於設定您為最高管理員
            </div>
        </div>
    </div>

    <script>
        // LINE Login 設定
        const LINE_LOGIN_CHANNEL_ID = '2008269293';
        const CALLBACK_URL = 'https://guimashen.vercel.app/test-userid.html';
        const STATE = 'test_userid';

        // 登入按鈕
        document.getElementById('loginBtn').addEventListener('click', function(e) {
            e.preventDefault();
            lineLogin();
        });

        // LINE Login
        function lineLogin() {
            const lineAuthUrl = `https://access.line.me/oauth2/v2.1/authorize?` +
                `response_type=code` +
                `&client_id=${LINE_LOGIN_CHANNEL_ID}` +
                `&redirect_uri=${encodeURIComponent(CALLBACK_URL)}` +
                `&state=${STATE}` +
                `&scope=profile%20openid`;
            
            window.location.href = lineAuthUrl;
        }

        // 頁面載入時檢查是否有 code
        window.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');

            if (code && state === 'test_userid') {
                // 顯示載入中
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('loadingSection').classList.add('show');

                // 取得 Access Token
                getAccessToken(code);
            }
        });

        // 取得 Access Token
        async function getAccessToken(code) {
            try {
                const response = await fetch('https://api.line.me/oauth2/v2.1/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: CALLBACK_URL,
                        client_id: LINE_LOGIN_CHANNEL_ID,
                        client_secret: '025a71c97099343e6e688bb6e393a125'
                    })
                });

                const data = await response.json();
                
                if (data.access_token) {
                    // 取得使用者資料
                    getUserProfile(data.access_token);
                } else {
                    throw new Error('無法取得 Access Token');
                }
            } catch (error) {
                alert('登入失敗：' + error.message);
                location.href = CALLBACK_URL;
            }
        }

        // 取得使用者資料
        async function getUserProfile(accessToken) {
            try {
                const response = await fetch('https://api.line.me/v2/profile', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                const profile = await response.json();
                
                if (profile.userId) {
                    // 顯示結果
                    document.getElementById('loadingSection').classList.remove('show');
                    document.getElementById('resultSection').classList.add('show');
                    document.getElementById('userId').textContent = profile.userId;
                } else {
                    throw new Error('無法取得使用者資料');
                }
            } catch (error) {
                alert('取得資料失敗：' + error.message);
                location.href = CALLBACK_URL;
            }
        }

        // 複製 User ID
        function copyUserId() {
            const userId = document.getElementById('userId').textContent;
            
            // 使用 Clipboard API
            if (navigator.clipboard) {
                navigator.clipboard.writeText(userId).then(() => {
                    alert('✅ User ID 已複製到剪貼簿！');
                }).catch(() => {
                    // 備用方法
                    fallbackCopy(userId);
                });
            } else {
                fallbackCopy(userId);
            }
        }

        // 備用複製方法
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                alert('✅ User ID 已複製到剪貼簿！');
            } catch (err) {
                alert('❌ 複製失敗，請手動複製');
            }
            
            document.body.removeChild(textarea);
        }
    </script>
</body>
</html>
