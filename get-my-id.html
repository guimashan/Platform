<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取得我的 LINE User ID</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        
        .info-box {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .line-id {
            background: #00C300;
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            word-break: break-all;
            margin: 20px 0;
            font-weight: bold;
        }
        
        .btn {
            background: #00C300;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            display: inline-block;
            text-decoration: none;
        }
        
        .btn:hover {
            background: #00B000;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,195,0,0.3);
        }
        
        .loading {
            display: none;
            margin: 20px 0;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #00C300;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .copy-btn {
            background: #2196F3;
            margin-top: 10px;
            padding: 10px 30px;
            font-size: 1rem;
        }
        
        .copy-btn:hover {
            background: #1976D2;
        }
        
        .success-msg {
            color: #4CAF50;
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 取得我的 LINE User ID</h1>
        
        <div id="loginSection">
            <div class="info-box">
                <p>點擊下方按鈕，使用 LINE 登入</p>
                <p>登入後會顯示你的 LINE User ID</p>
            </div>
            <button class="btn" onclick="loginWithLine()">
                使用 LINE 登入
            </button>
        </div>
        
        <div id="loadingSection" class="loading">
            <div class="spinner"></div>
            <p>正在取得資料...</p>
        </div>
        
        <div id="resultSection" style="display: none;">
            <div class="info-box">
                <h2>✅ 成功取得你的 LINE User ID！</h2>
                <p style="margin-top: 10px;">請複製以下 ID，並傳給開發人員：</p>
            </div>
            
            <div class="line-id" id="lineUserId">
                <!-- ID 會顯示在這裡 -->
            </div>
            
            <button class="btn copy-btn" onclick="copyLineId()">
                📋 複製 ID
            </button>
            <div class="success-msg" id="copySuccess">✅ 已複製到剪貼簿！</div>
            
            <div class="info-box" style="margin-top: 20px;">
                <h3>📝 你的其他資訊：</h3>
                <p><strong>顯示名稱：</strong><span id="displayName"></span></p>
                <p><strong>狀態訊息：</strong><span id="statusMessage"></span></p>
            </div>
        </div>
    </div>

    <script>
        // LINE Login 設定
        const LINE_LOGIN_CHANNEL_ID = '2008269293';  // 你的 LINE Login Channel ID
        const CALLBACK_URL = 'https://你的帳號.github.io/Platform/get-line-id.html';  // ⚠️ 待會要改成你的網址
        
        // 檢查是否從 LINE 登入返回
        window.onload = function() {
            const params = new URLSearchParams(window.location.hash.substring(1));
            const accessToken = params.get('access_token');
            
            if (accessToken) {
                // 顯示載入中
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('loadingSection').style.display = 'block';
                
                // 取得使用者資料
                getUserProfile(accessToken);
            }
        };
        
        // LINE Login
        function loginWithLine() {
            const state = Math.random().toString(36).substring(7);
            const nonce = Math.random().toString(36).substring(7);
            
            const lineLoginUrl = 'https://access.line.me/oauth2/v2.1/authorize?' +
                'response_type=token' +
                '&client_id=' + LINE_LOGIN_CHANNEL_ID +
                '&redirect_uri=' + encodeURIComponent(CALLBACK_URL) +
                '&state=' + state +
                '&scope=profile%20openid' +
                '&nonce=' + nonce;
            
            window.location.href = lineLoginUrl;
        }
        
        // 取得使用者資料
        async function getUserProfile(accessToken) {
            try {
                const response = await fetch('https://api.line.me/v2/profile', {
                    headers: {
                        'Authorization': 'Bearer ' + accessToken
                    }
                });
                
                const data = await response.json();
                
                // 顯示結果
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('resultSection').style.display = 'block';
                
                document.getElementById('lineUserId').textContent = data.userId;
                document.getElementById('displayName').textContent = data.displayName;
                document.getElementById('statusMessage').textContent = data.statusMessage || '(無)';
                
            } catch (error) {
                alert('取得資料失敗：' + error.message);
            }
        }
        
        // 複製 LINE User ID
        function copyLineId() {
            const lineId = document.getElementById('lineUserId').textContent;
            navigator.clipboard.writeText(lineId).then(() => {
                document.getElementById('copySuccess').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('copySuccess').style.display = 'none';
                }, 2000);
            });
        }
    </script>
</body>
</html>
