<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 登入處理中...</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            color: #666;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        .error {
            background: #ffebee;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #f44336;
            margin-top: 20px;
        }

        .error h2 {
            color: #c62828;
            margin-bottom: 10px;
        }

        .error p {
            color: #666;
            line-height: 1.6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔐</div>
        <h1>LINE 登入處理中</h1>
        <div class="spinner"></div>
        <div class="status" id="status">正在驗證您的身份...</div>
        <div id="error" style="display: none;"></div>
    </div>

    <script type="module">
        // 新的前端邏輯：不包含 client_secret，將任務轉交給後端 API

const VERSEL_API_URL = '/api/line-callback'; // ❗ 指向您剛才建立的後端 API

// 刪除 LINE_LOGIN_CHANNEL_ID 和 LINE_LOGIN_CHANNEL_SECRET 宣告

// 🔧 修正：動態取得當前網址，確保與 LINE 授權時一致
const REDIRECT_URI = window.location.origin + window.location.pathname;
console.log('動態 REDIRECT_URI:', REDIRECT_URI);

function updateStatus(message) {
    document.getElementById('status').textContent = message;
    console.log('[STATUS]', message);
}

function showError(title, message) {
    document.querySelector('.spinner').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').innerHTML = `
        <div class="error">
            <h2>❌ ${title}</h2>
            <p>${message}</p>
        </div>
    `;
}

async function handleCallback() {
    try {
        console.log('=== LINE 登入 Callback 開始 (新版) ===');
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');

        if (error) {
            throw new Error(`LINE 授權失敗: ${error}`);
        }
        if (!code) {
            throw new Error('缺少授權碼 (code)');
        }

        // 1. 解析 state 以獲取導向 URL
        let redirectUrl = '/checkin/'; 
        if (state) {
            try {
                const stateData = JSON.parse(decodeURIComponent(state));
                if (stateData.redirect) {
                    redirectUrl = stateData.redirect;
                }
            } catch (e) {
                console.warn('⚠️ 無法解析 state，使用預設導向');
            }
        }
        
        // 2. 呼叫後端 API 進行 Access Token 交換 (安全步驟)
        updateStatus('正在將授權碼傳送給伺服器...');
            
        const tokenResponse = await fetch(VERSEL_API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify({ // 將 code 和 redirect_uri 傳給後端
                code: code,
                redirect_uri: REDIRECT_URI, 
            })
        });

        if (!tokenResponse.ok) {
            const errorData = await tokenResponse.json();
            let errorMessage = `登入驗證失敗: ${errorData.details || errorData.error || tokenResponse.status}`;

            // 如果後端返回 400 Bad Request，且是 LINE 傳來的錯誤
            if (errorData.details && errorData.details.includes('invalid_client_secret')) {
                errorMessage = "登入失敗：後端配置錯誤。請檢查 Vercel 環境變數 'LINE_CHANNEL_SECRET' 是否正確。";
            } else if (errorData.details && errorData.details.includes('invalid_grant')) {
                errorMessage = "登入失敗：授權碼無效或已過期。請重新從登入頁面操作。";
            }
            throw new Error(errorMessage);
        }

        const loginData = await tokenResponse.json();
        const profile = loginData.user;
        
        console.log('✓ 登入資料取得成功');

        // 3. 儲存到 localStorage
        updateStatus(`登入成功！歡迎您，${profile.displayName}`);

        localStorage.setItem('line_user_id', profile.userId);
        localStorage.setItem('line_display_name', profile.displayName);
        localStorage.setItem('line_picture_url', profile.pictureUrl || '');
        localStorage.setItem('line_login_timestamp', Date.now().toString());

        // 4. 導回原頁面
        setTimeout(() => {
            window.location.href = redirectUrl;
        }, 1000);

    } catch (error) {
        console.error('✗ 處理失敗:', error);
        showError('登入失敗', error.message);
    }
}

handleCallback();

        
    </script>
</body>
</html>
