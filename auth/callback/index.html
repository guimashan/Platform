<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 登入處理中...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .message {
            color: #666;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            text-align: left;
        }

        .error h3 {
            color: #f44336;
            margin-bottom: 10px;
        }

        .error p {
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>LINE 登入處理中...</h1>
        <p class="message">請稍候，正在完成登入流程</p>
        <div id="error-container"></div>
    </div>

    <!-- 載入共用設定 -->
    <script src="/config/superadmin.js"></script>

    <script type="module">
        // ═══════════════════════════════════════════════════════════════
        // LINE Login OAuth 回調處理
        // ═══════════════════════════════════════════════════════════════

        // Firebase 設定（checkin 系統）
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBYrg7L1tHWkvC4FyrnA7eZRCpi6B6DDs8",
            authDomain: "checkin-29f7f.firebaseapp.com",
            projectId: "checkin-29f7f",
            storageBucket: "checkin-29f7f.firebasestorage.app",
            messagingSenderId: "698452461679",
            appId: "1:698452461679:web:bd99b65066602e0a92e59a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LINE Login 設定
        const LINE_LOGIN_CHANNEL_ID = '2008269293';
        const LINE_LOGIN_CHANNEL_SECRET = '025a71c97099343e6e688bb6e393a125';

        // 主要處理流程
        async function handleCallback() {
            try {
                // 取得 URL 參數
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const state = urlParams.get('state');
                const error = urlParams.get('error');

                // 檢查是否有錯誤
                if (error) {
                    throw new Error(`LINE Login 錯誤: ${error}`);
                }

                if (!code) {
                    throw new Error('未收到授權碼');
                }

                console.log('收到授權碼:', code);
                console.log('State:', state);

                // 取得 Access Token
                const tokenData = await getAccessToken(code);
                console.log('取得 Access Token 成功');

                // 取得使用者資料
                const profile = await getUserProfile(tokenData.access_token);
                console.log('使用者資料:', profile);

                // 儲存使用者資料到 Firebase
                await saveUserToFirebase(profile);

                // 儲存登入狀態到 localStorage
                localStorage.setItem('line_user_id', profile.userId);
                localStorage.setItem('line_display_name', profile.displayName);
                localStorage.setItem('line_picture_url', profile.pictureUrl || '');
                localStorage.setItem('line_access_token', tokenData.access_token);

                // 根據 state 參數導向不同頁面
                const redirectUrl = getRedirectUrl(state);
                console.log('導向:', redirectUrl);

                // 延遲 1 秒後導向，讓使用者看到成功訊息
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 1000);

            } catch (error) {
                console.error('處理失敗:', error);
                showError(error.message);
            }
        }

        // 取得 Access Token
        async function getAccessToken(code) {
            const response = await fetch('https://api.line.me/oauth2/v2.1/token', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: 'https://guimashen.vercel.app/auth/callback',
                    client_id: LINE_LOGIN_CHANNEL_ID,
                    client_secret: LINE_LOGIN_CHANNEL_SECRET
                })
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`取得 Access Token 失敗: ${errorText}`);
            }

            return await response.json();
        }

        // 取得使用者資料
        async function getUserProfile(accessToken) {
            const response = await fetch('https://api.line.me/v2/profile', {
                headers: {
                    'Authorization': `Bearer ${accessToken}`
                }
            });

            if (!response.ok) {
                throw new Error('取得使用者資料失敗');
            }

            return await response.json();
        }

        // 儲存使用者資料到 Firebase
        async function saveUserToFirebase(profile) {
            const userRef = doc(db, 'users', profile.userId);
            const userDoc = await getDoc(userRef);

            // 檢查是否為 superadmin
            const isSuperAdmin = profile.userId === SYSTEM_CONFIG.SUPERADMIN_LINE_ID;
            
            if (!userDoc.exists()) {
                // 新使用者
                await setDoc(userRef, {
                    lineId: profile.userId,
                    displayName: profile.displayName,
                    pictureUrl: profile.pictureUrl || '',
                    role: isSuperAdmin ? 'superadmin' : 'user',
                    status: 'active',
                    registeredAt: new Date().toISOString(),
                    lastLoginAt: new Date().toISOString()
                });
                console.log('新使用者已建立:', profile.userId);
            } else {
                // 更新登入時間
                await setDoc(userRef, {
                    lastLoginAt: new Date().toISOString(),
                    displayName: profile.displayName,
                    pictureUrl: profile.pictureUrl || ''
                }, { merge: true });
                console.log('使用者登入時間已更新');
            }
        }

        // 根據 state 決定導向頁面
        function getRedirectUrl(state) {
            if (!state) {
                return '/checkin/';
            }

            // 解析 state 參數
            try {
                const stateData = JSON.parse(decodeURIComponent(state));
                return stateData.redirect || '/checkin/';
            } catch {
                // 如果 state 不是 JSON，直接當作路徑使用
                return state;
            }
        }

        // 顯示錯誤訊息
        function showError(message) {
            const container = document.getElementById('error-container');
            container.innerHTML = `
                <div class="error">
                    <h3>❌ 登入失敗</h3>
                    <p>${message}</p>
                    <p style="margin-top: 10px;">
                        <a href="/checkin/" style="color: #2196F3;">返回簽到頁面</a>
                    </p>
                </div>
            `;
        }

        // 執行
        handleCallback();
    </script>
</body>
</html>
