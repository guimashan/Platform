<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 登入處理中...</title>
    <style>
        body { font-family: 'Microsoft JhengHei', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .container { background: white; border-radius: 20px; padding: 40px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 400px; }
        .logo { font-size: 4rem; margin-bottom: 20px; }
        h1 { color: #667eea; margin-bottom: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status { color: #666; font-size: 0.9rem; margin-top: 15px; }
        .error { background: #ffebee; padding: 20px; border-radius: 10px; border-left: 4px solid #f44336; margin-top: 20px; }
        .error h2 { color: #c62828; margin-bottom: 10px; }
        .error p { color: #666; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔐</div>
        <h1>LINE 登入處理中</h1>
        <div class="spinner"></div>
        <div class="status" id="status">正在驗證您的身份...</div>
        <div id="error" style="display: none;"></div>
    </div>

    <script type="module">
        const LINE_LOGIN_CHANNEL_ID = '2008269293';
        const REDIRECT_URI = 'https://guimashen.vercel.app/auth/callback';

        function updateStatus(message) { document.getElementById('status').textContent = message; }
        function showError(title, message) { document.querySelector('.spinner').style.display = 'none'; document.getElementById('error').style.display = 'block'; document.getElementById('error').innerHTML = `<div class="error"><h2>❌ ${title}</h2><p>${message}</p></div>`; }

        async function handleCallback() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const state = urlParams.get('state');
                const error = urlParams.get('error');

                if (error) throw new Error(`LINE 授權失敗: ${error}`);
                if (!code) throw new Error('缺少授權碼 (code)');

                let redirectUrl = '/checkin/';
                if (state) {
                    try {
                        const stateData = JSON.parse(decodeURIComponent(state));
                        if (stateData.redirect) redirectUrl = stateData.redirect;
                    } catch (e) { console.error('無法解析 state:', e); }
                }

                updateStatus('正在向後端驗證授權碼...');
                const backendResponse = await fetch('/api/line/callback', { // <--- 修改這裡的 URL
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, redirect_uri: REDIRECT_URI, client_id: LINE_LOGIN_CHANNEL_ID })
                });

                if (!backendResponse.ok) {
                    const errorData = await backendResponse.json().catch(() => ({ error: '無法解析後端錯誤回應' }));
                    throw new Error(`後端處理失敗: ${errorData.error || backendResponse.status}`);
                }

                const { profile } = await backendResponse.json();

                localStorage.setItem('line_user_id', profile.userId);
                localStorage.setItem('line_display_name', profile.displayName);
                localStorage.setItem('line_picture_url', profile.pictureUrl || '');
                localStorage.setItem('line_login_timestamp', Date.now().toString());

                updateStatus('登入成功！正在導回...');
                setTimeout(() => { window.location.href = redirectUrl; }, 1000);

            } catch (error) {
                console.error('處理失敗:', error);
                showError('登入失敗', error.message);
            }
        }

        handleCallback();
    </script>
</body>
</html>
