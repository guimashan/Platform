<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 登入處理中...</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            color: #666;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        .error {
            background: #ffebee;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #f44336;
            margin-top: 20px;
        }

        .error h2 {
            color: #c62828;
            margin-bottom: 10px;
        }

        .error p {
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔐</div>
        <h1>LINE 登入處理中</h1>
        <div class="spinner"></div>
        <div class="status" id="status">正在驗證您的身份...</div>
        <div id="error" style="display: none;"></div>
    </div>

    <script type="module">
        // 請將這邊的 CHANNEL_ID 換成你的 LINE Channel ID
        const LINE_LOGIN_CHANNEL_ID = '2008269293';
        // 注意：不再在前端硬編碼 CHANNEL_SECRET

        // 請確保這個 REDIRECT_URI 與你在 LINE Developer Console 中設定的完全一致（不含空格）
        const REDIRECT_URI = 'https://guimashen.vercel.app/auth/callback'; // 確保沒有空格

        function updateStatus(message) {
            document.getElementById('status').textContent = message;
            console.log('[STATUS]', message);
        }

        function showError(title, message) {
            document.querySelector('.spinner').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').innerHTML = `
                <div class="error">
                    <h2>❌ ${title}</h2>
                    <p>${message}</p>
                </div>
            `;
        }

        async function handleCallback() {
            try {
                console.log('=== LINE 登入 Callback 開始 ===');

                // 1. 取得 URL 參數
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const state = urlParams.get('state');
                const error = urlParams.get('error');

                console.log('URL 參數:');
                console.log('  - code:', code ? '✓ 有' : '✗ 無');
                console.log('  - state:', state ? '✓ 有' : '✗ 無');
                console.log('  - error:', error || '無');

                // 檢查是否有錯誤
                if (error) {
                    throw new Error(`LINE 授權失敗: ${error}`);
                }

                // 檢查是否有 code
                if (!code) {
                    throw new Error('缺少授權碼 (code)');
                }

                // 2. 解析 state 取得原始頁面
                let redirectUrl = '/checkin/'; // 預設導向

                if (state) {
                    try {
                        console.log('原始 state:', state);
                        const decodedState = decodeURIComponent(state);
                        console.log('解碼後 state:', decodedState);

                        const stateData = JSON.parse(decodedState);
                        console.log('解析後 state 資料:', stateData);

                        if (stateData.redirect) {
                            redirectUrl = stateData.redirect;
                            console.log('✓ 將導回:', redirectUrl);
                        } else {
                            console.warn('⚠️ state 中沒有 redirect 欄位');
                        }
                    } catch (e) {
                        console.error('✗ 無法解析 state:', e);
                        console.error('State 內容:', state);
                        console.log('⚠️ 使用預設導向:', redirectUrl);
                    }
                } else {
                    console.warn('⚠️ 沒有 state 參數');
                    console.log('使用預設導向:', redirectUrl);
                }

                // 3. 發送 code 到你的後端 API 端點進行處理 (包含 token exchange 和 profile fetch)
                updateStatus('正在驗證授權碼並取得使用者資訊...');
                console.log('將授權碼發送到後端進行處理...');

                // 發送 POST 請求到你的後端 API
                const backendResponse = await fetch('/api/line/callback', { // 請確保此路徑正確
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        code: code,
                        redirect_uri: REDIRECT_URI,
                        client_id: LINE_LOGIN_CHANNEL_ID,
                        // client_secret 不會在此處發送
                    })
                });

                if (!backendResponse.ok) {
                    const errorData = await backendResponse.json().catch(() => ({ error: '無法解析後端錯誤回應' }));
                    console.error('後端處理錯誤:', errorData);
                    throw new Error(`後端處理失敗: ${errorData.error || backendResponse.status}`);
                }

                const { profile } = await backendResponse.json();
                console.log('✓ 從後端取得使用者資料成功');
                console.log('  - userId:', profile.userId);
                console.log('  - displayName:', profile.displayName);

                // 4. 儲存到 localStorage
                updateStatus('正在儲存登入資訊...');

                try {
                    localStorage.setItem('line_user_id', profile.userId);
                    localStorage.setItem('line_display_name', profile.displayName);
                    localStorage.setItem('line_picture_url', profile.pictureUrl || '');
                    localStorage.setItem('line_login_timestamp', Date.now().toString());

                    console.log('✓ localStorage 儲存成功');

                    // 驗證儲存
                    const savedUserId = localStorage.getItem('line_user_id');
                    const savedDisplayName = localStorage.getItem('line_display_name');

                    console.log('驗證儲存結果:');
                    console.log('  - line_user_id:', savedUserId);
                    console.log('  - line_display_name:', savedDisplayName);

                    if (savedUserId !== profile.userId) {
                        throw new Error('localStorage 儲存驗證失敗');
                    }

                    console.log('✓ 儲存驗證通過');

                } catch (storageError) {
                    console.error('localStorage 錯誤:', storageError);
                    throw new Error('無法儲存登入資訊，請確認瀏覽器允許儲存資料');
                }

                // 5. 導回原頁面
                updateStatus('登入成功！正在導回...');
                console.log('=== 準備導向 ===');
                console.log('目標網址:', redirectUrl);

                setTimeout(() => {
                    console.log('執行導向...');
                    window.location.href = redirectUrl;
                }, 1000);

            } catch (error) {
                console.error('✗ 處理失敗:', error);
                showError('登入失敗', error.message);
            }
        }

        // 執行 callback 處理
        handleCallback();
    </script>
</body>
</html>
