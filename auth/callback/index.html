<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入處理中...</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }

        .loading-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2196F3;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
        }

        .error {
            color: #f44336;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="spinner"></div>
        <h2>🔐 登入處理中...</h2>
        <p id="status">正在驗證您的 LINE 帳號</p>
        <p class="error" id="error" style="display:none;"></p>
    </div>

    <script type="module">
        // Firebase Configuration (checkin 專案)
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBYrg7L1tHWkvC4FyrnA7eZRCpi6B6DDs8",
            authDomain: "checkin-29f7f.firebaseapp.com",
            projectId: "checkin-29f7f",
            storageBucket: "checkin-29f7f.firebasestorage.app",
            messagingSenderId: "698452461679",
            appId: "1:698452461679:web:bd99b65066602e0a92e59a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LINE Login 設定
        const LINE_CHANNEL_ID = '2008269293';
        const LINE_CHANNEL_SECRET = '025a71c97099343e6e688bb6e393a125';

        // 最高管理員 LINE User ID
        const SUPERADMIN_LINE_ID = 'U9f0bc35b722b4503eeb7cc0466dfbbc3';

        // 處理 LINE Login 回調
        async function handleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const error = urlParams.get('error');

            // 檢查是否有錯誤
            if (error) {
                showError('登入失敗：' + error);
                setTimeout(() => {
                    window.location.href = '/checkin/';
                }, 3000);
                return;
            }

            // 檢查是否有 code
            if (!code) {
                showError('未收到授權碼，請重新登入');
                setTimeout(() => {
                    window.location.href = '/checkin/';
                }, 3000);
                return;
            }

            try {
                updateStatus('正在取得 LINE 資訊...');

                // 使用 code 換取 access token
                const tokenResponse = await fetch('https://api.line.me/oauth2/v2.1/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: window.location.origin + '/auth/callback/',
                        client_id: LINE_CHANNEL_ID,
                        client_secret: LINE_CHANNEL_SECRET
                    })
                });

                const tokenData = await tokenResponse.json();

                if (tokenData.error) {
                    throw new Error(tokenData.error_description || tokenData.error);
                }

                const accessToken = tokenData.access_token;

                updateStatus('正在取得使用者資料...');

                // 取得使用者資訊
                const profileResponse = await fetch('https://api.line.me/v2/profile', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                const profile = await profileResponse.json();

                if (!profile.userId) {
                    throw new Error('無法取得使用者資訊');
                }

                updateStatus('正在儲存使用者資料...');

                // 檢查使用者是否已存在
                const userRef = doc(db, 'users', profile.userId);
                const userDoc = await getDoc(userRef);

                let userData = {
                    lineUserId: profile.userId,
                    displayName: profile.displayName || '未知使用者',
                    pictureUrl: profile.pictureUrl || '',
                    lastLogin: serverTimestamp()
                };

                // 如果是 superadmin
                if (profile.userId === SUPERADMIN_LINE_ID) {
                    userData.role = 'superadmin';
                    userData.status = 'active';
                    if (!userDoc.exists()) {
                        userData.createdAt = serverTimestamp();
                    }
                } else if (!userDoc.exists()) {
                    // 新使用者，預設為 user
                    userData.role = 'user';
                    userData.status = 'active';
                    userData.createdAt = serverTimestamp();
                } else {
                    // 已存在的使用者，保留原有角色
                    const existingData = userDoc.data();
                    userData.role = existingData.role || 'user';
                    userData.status = existingData.status || 'active';
                }

                // 儲存到 Firestore
                await setDoc(userRef, userData, { merge: true });

                // 儲存到 localStorage
                localStorage.setItem('lineProfile', JSON.stringify(profile));
                localStorage.setItem('lineAccessToken', accessToken);
                localStorage.setItem('userRole', userData.role);

                updateStatus('登入成功！正在導向...');

                // 根據 state 決定導向位置
                let redirectUrl = '/checkin/';
                if (state) {
                    if (state === 'checkin') redirectUrl = '/checkin/';
                    else if (state === 'manage') redirectUrl = '/checkin/manage/';
                    else if (state === 'schedule') redirectUrl = '/schedule/';
                    else if (state === 'service') redirectUrl = '/service/';
                }

                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 1000);

            } catch (err) {
                console.error('處理登入時發生錯誤:', err);
                showError('登入處理失敗：' + err.message);
                setTimeout(() => {
                    window.location.href = '/checkin/';
                }, 3000);
            }
        }

        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        function showError(message) {
            document.getElementById('error').textContent = message;
            document.getElementById('error').style.display = 'block';
            document.querySelector('.spinner').style.display = 'none';
        }

        // 執行回調處理
        handleCallback();
    </script>
</body>
</html>
