<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 登入處理中...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #00C300;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .status {
            color: #666;
            margin: 15px 0;
            font-size: 1rem;
        }

        .error {
            background: #ffebee;
            border: 2px solid #f44336;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            text-align: left;
        }

        .error h2 {
            color: #f44336;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .error-details {
            background: #fff;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #555;
            word-wrap: break-word;
            max-height: 300px;
            overflow-y: auto;
        }

        .error-details p {
            margin: 8px 0;
            line-height: 1.6;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: #00C300;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: #00B000;
        }

        .debug-log {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.75rem;
            font-family: 'Courier New', monospace;
            text-align: left;
        }

        .log-entry {
            margin: 5px 0;
            padding: 3px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .log-success { color: #4CAF50; }
        .log-error { color: #f44336; }
        .log-warning { color: #ff9800; }
        .log-info { color: #2196F3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h1 id="title">LINE 登入處理中...</h1>
        <p class="status" id="status">請稍候，正在驗證您的身份</p>
        
        <div id="error-container"></div>
        <div id="debug-log" class="debug-log"></div>
    </div>

    <!-- 載入共用設定 -->
    <script src="/config/superadmin.js"></script>

    <script type="module">
        // ═══════════════════════════════════════════════════════════════
        // LINE Login Callback 處理（改良版 - 詳細日誌）
        // ═══════════════════════════════════════════════════════════════

        // Firebase 設定
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBYrg7L1tHWkvC4FyrnA7eZRCpi6B6DDs8",
            authDomain: "checkin-29f7f.firebaseapp.com",
            projectId: "checkin-29f7f",
            storageBucket: "checkin-29f7f.firebasestorage.app",
            messagingSenderId: "698452461679",
            appId: "1:698452461679:web:bd99b65066602e0a92e59a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LINE API 設定
        const LINE_CHANNEL_ID = '2008269293';
        const LINE_CHANNEL_SECRET = '025a71c97099343e6e688bb6e393a125';

        // 日誌系統
        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString('zh-TW');
            const logDiv = document.getElementById('debug-log');
            
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;

            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        // 顯示錯誤
        function showError(title, details) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = '❌ ' + title;
            document.getElementById('status').textContent = '';

            const errorHtml = `
                <div class="error">
                    <h2>登入失敗</h2>
                    <p>${title}</p>
                    <div class="error-details">
                        ${details.split('\n').map(line => `<p>${line}</p>`).join('')}
                    </div>
                    <a href="/checkin/" class="btn">返回簽到頁面</a>
                </div>
            `;

            document.getElementById('error-container').innerHTML = errorHtml;
        }

        // 更新狀態
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        // 主要處理流程
        async function handleCallback() {
            try {
                addLog('========== 開始處理 LINE Callback ==========', 'info');

                // 1. 取得 URL 參數
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const state = urlParams.get('state');
                const error = urlParams.get('error');
                const errorDescription = urlParams.get('error_description');

                addLog(`URL 參數: code=${code ? '✓' : '✗'}, state=${state ? '✓' : '✗'}`, 'info');

                // 檢查是否有錯誤
                if (error) {
                    addLog(`❌ LINE 授權錯誤: ${error}`, 'error');
                    throw new Error(`LINE 授權失敗: ${error}\n${errorDescription || ''}`);
                }

                if (!code) {
                    addLog('❌ 缺少 authorization code', 'error');
                    throw new Error('缺少 authorization code\n請重新登入');
                }

                // 2. 解析 state (redirect URL)
                let redirectUrl = '/checkin/';
                try {
                    const stateData = JSON.parse(decodeURIComponent(state));
                    redirectUrl = stateData.redirect || '/checkin/';
                    addLog(`導向網址: ${redirectUrl}`, 'info');
                } catch (e) {
                    addLog('⚠️ 無法解析 state，使用預設導向', 'warning');
                }

                // 3. 用 code 換取 access token
                updateStatus('正在取得 access token...');
                addLog('📡 呼叫 LINE Token API...', 'info');

                const tokenResponse = await fetch('https://api.line.me/oauth2/v2.1/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: 'https://guimashen.vercel.app/auth/callback',
                        client_id: LINE_CHANNEL_ID,
                        client_secret: LINE_CHANNEL_SECRET
                    })
                });

                addLog(`Token API 回應: ${tokenResponse.status} ${tokenResponse.statusText}`, 
                       tokenResponse.ok ? 'success' : 'error');

                if (!tokenResponse.ok) {
                    const errorText = await tokenResponse.text();
                    addLog(`❌ Token API 錯誤內容: ${errorText}`, 'error');
                    throw new Error(`取得 token 失敗 (${tokenResponse.status})\n${errorText}`);
                }

                const tokenData = await tokenResponse.json();
                const accessToken = tokenData.access_token;
                addLog('✅ Access token 取得成功', 'success');

                // 4. 用 access token 取得使用者資料
                updateStatus('正在取得使用者資料...');
                addLog('📡 呼叫 LINE Profile API...', 'info');

                const profileResponse = await fetch('https://api.line.me/v2/profile', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                addLog(`Profile API 回應: ${profileResponse.status} ${profileResponse.statusText}`,
                       profileResponse.ok ? 'success' : 'error');

                if (!profileResponse.ok) {
                    const errorText = await profileResponse.text();
                    addLog(`❌ Profile API 錯誤內容: ${errorText}`, 'error');
                    throw new Error(`取得使用者資料失敗 (${profileResponse.status})\n${errorText}`);
                }

                const profile = await profileResponse.json();
                addLog(`✅ 使用者資料: ${JSON.stringify(profile)}`, 'success');








                
                // 5. 儲存到 localStorage
                updateStatus('正在儲存登入資訊...');
                addLog('💾 準備儲存登入資訊到 localStorage...', 'info');

                try {
                    // 儲存三個關鍵資料
                    localStorage.setItem('line_user_id', profile.userId);
                    localStorage.setItem('line_display_name', profile.displayName);
                    localStorage.setItem('line_picture_url', profile.pictureUrl || '');
    
                    // 額外儲存一個時間戳記，標記登入時間
                    localStorage.setItem('line_login_time', new Date().toISOString());
    
                    addLog('✅ 已儲存到 localStorage', 'success');
    
                    // 立即讀取回來驗證
                    const verify_userId = localStorage.getItem('line_user_id');
                    const verify_displayName = localStorage.getItem('line_display_name');
                    const verify_pictureUrl = localStorage.getItem('line_picture_url');
                    const verify_loginTime = localStorage.getItem('line_login_time');
    
                    addLog('🔍 驗證儲存結果...', 'info');
                    addLog(`✓ User ID: ${verify_userId ? '已儲存' : '❌ 失敗'}`, verify_userId ? 'success' : 'error');
                    addLog(`✓ 名稱: ${verify_displayName || '(空)'}`, verify_displayName ? 'success' : 'warning');
                    addLog(`✓ 頭像: ${verify_pictureUrl ? '已儲存' : '(空)'}`, 'info');
                    addLog(`✓ 登入時間: ${verify_loginTime}`, 'info');
    
                    if (!verify_userId || !verify_displayName) {
                        throw new Error('localStorage 寫入驗證失敗');
                    }
    
                    addLog('✅ 驗證通過：資料確實已儲存', 'success');
    
                } catch (storageError) {
                    addLog(`❌ localStorage 儲存失敗: ${storageError.message}`, 'error');
                    addLog('⚠️ 可能原因：瀏覽器隱私設定阻擋了 localStorage', 'warning');
                    throw new Error('無法儲存登入資訊，請檢查瀏覽器設定');
                }









                
                // 6. 儲存到 Firebase
                updateStatus('正在同步資料...');
                addLog('💾 儲存使用者資料到 Firebase...', 'info');

                try {
                    const userRef = doc(db, 'users', profile.userId);
                    const userDoc = await getDoc(userRef);
                    
                    if (!userDoc.exists()) {
                        // 新使用者，建立資料
                        await setDoc(userRef, {
                            userId: profile.userId,
                            displayName: profile.displayName,
                            pictureUrl: profile.pictureUrl || '',
                            role: 'user',
                            createdAt: new Date(),
                            lastLoginAt: new Date()
                        });
                        addLog('✅ 新使用者資料已建立', 'success');
                    } else {
                        // 更新最後登入時間
                        await setDoc(userRef, {
                            lastLoginAt: new Date()
                        }, { merge: true });
                        addLog('✅ 使用者資料已更新', 'success');
                    }
                } catch (firebaseError) {
                    addLog(`⚠️ Firebase 儲存失敗: ${firebaseError.message}`, 'warning');
                    // 不阻擋流程，繼續導向
                }

                // 7. 導向回原頁面
                addLog('✅ 登入成功！準備導向...', 'success');
                updateStatus('登入成功！正在返回...');
                
                setTimeout(() => {
                    addLog(`🔗 導向: ${redirectUrl}`, 'info');
                    window.location.href = redirectUrl;
                }, 1000);

            } catch (error) {
                addLog(`❌ 處理失敗: ${error.message}`, 'error');
                addLog(`錯誤堆疊: ${error.stack}`, 'error');

                showError(
                    '登入處理失敗',
                    `錯誤訊息：${error.message}\n\n` +
                    `請嘗試：\n` +
                    `1. 返回簽到頁面重新登入\n` +
                    `2. 檢查網路連線\n` +
                    `3. 使用 Chrome 或 Safari 瀏覽器\n` +
                    `4. 如果持續失敗，請聯絡管理員\n\n` +
                    `請將上方的執行日誌截圖給管理員`
                );
            }
        }

        // 執行
        handleCallback();
    </script>
</body>
</html>
