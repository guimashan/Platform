<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龜馬山 紫皇天乙真慶宮 - 整合服務平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h1 {
            color: #c23636;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        h2 {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-weight: normal;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
        }

        .btn-primary {
            background: #4CAF50;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-secondary {
            background: #2196F3;
        }

        .btn-secondary:hover {
            background: #1976D2;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(33, 150, 243, 0.4);
        }

        .info {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            color: #666;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .info strong {
            color: #333;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1rem; }
            .btn { font-size: 1rem; padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏯</div>
        <h1>龜馬山 紫皇天乙真慶宮</h1>
        <h2>整合服務平台</h2>
        
        <a href="/checkin/" class="btn btn-primary">📍 奉香簽到</a>
        <a href="/checkin/manage/" class="btn btn-secondary">📊 管理後台</a>
        
        <div class="info">
            <strong>📱 使用說明</strong><br>
            本服務需透過 LINE 官方帳號進行操作<br>
            如有疑問，請洽管理人員<br><br>
            <strong>🔐 系統狀態：</strong>正常運作中
        </div>
    </div>
</body>
</html>
