<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龜馬山 紫皇天乙真慶宮 - 整合服務平台</title>
    <style>
        /* ========== 全域樣式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ========== 主容器 ========== */
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* ========== 標題樣式 ========== */
        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h1 {
            color: #c23636;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        /* ========== 按鈕樣式 ========== */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
        }

        .btn-primary {
            background: #4CAF50;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-secondary {
            background: #2196F3;
        }

        .btn-secondary:hover {
            background: #0b7dda;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
        }

        .btn-warning {
            background: #ff9800;
        }

        .btn-warning:hover {
            background: #e68900;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
        }

        /* ========== 資訊區塊 ========== */
        .info-box {
            background: #f5f5f5;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-top: 30px;
            border-radius: 5px;
            text-align: left;
        }

        .info-box p {
            color: #555;
            font-size: 0.9rem;
            line-height: 1.6;
            margin: 5px 0;
        }

        /* ========== 版本資訊 ========== */
        .version {
            margin-top: 30px;
            color: #999;
            font-size: 0.8rem;
        }

        /* ========== 響應式設計 ========== */
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .btn {
                font-size: 1rem;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 標題區 -->
        <div class="logo">🏯</div>
        <h1>龜馬山 紫皇天乙真慶宮</h1>
        <p class="subtitle">整合服務平台</p>

        <!-- 導航按鈕 -->
        <a href="/checkin/" class="btn btn-primary">
            📍 奉香簽到系統
        </a>
        
        <a href="/checkin/manage/" class="btn btn-secondary">
            📊 奉香管理後台
        </a>

        <a href="/schedule/" class="btn btn-warning" style="opacity: 0.6; cursor: not-allowed;">
            📅 排班系統（開發中）
        </a>

        <a href="/service/" class="btn btn-warning" style="opacity: 0.6; cursor: not-allowed;">
            🙏 神服服務（開發中）
        </a>

        <!-- 資訊區 -->
        <div class="info-box">
            <p>📱 <strong>使用說明：</strong></p>
            <p>1. 本服務需透過 LINE 官方帳號進行操作</p>
            <p>2. 請先加入「龜馬山 紫皇天乙真慶宮」LINE 官方帳號</p>
            <p>3. 發送關鍵字進行註冊與使用</p>
            <p>4. 如有疑問，請洽管理人員</p>
        </div>

        <!-- 版本資訊 -->
        <p class="version">Version 1.0.0 | 最後更新：2025-10-13</p>
    </div>

    <!-- 載入共用設定 -->
    <script src="/config/superadmin.js"></script>
    <script>
        // 顯示系統資訊（開發用）
        console.log('系統名稱:', SYSTEM_CONFIG.SYSTEM_NAME);
        console.log('系統版本:', SYSTEM_CONFIG.VERSION);
        console.log('最高管理員 ID:', SYSTEM_CONFIG.SUPERADMIN_LINE_ID);
    </script>
</body>
</html>
