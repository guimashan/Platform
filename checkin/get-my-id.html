<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查詢我的 LINE User ID</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .user-id {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            word-break: break-all;
            font-size: 1.2rem;
            color: #c23636;
            font-weight: bold;
        }
        .btn {
            background: #00C300;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #00B000;
        }
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #1976d2;
        }
        .loading {
            display: none;
            color: #666;
            margin: 20px 0;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 查詢我的 LINE User ID</h1>
        
        <div id="loginSection">
            <p>點擊下方按鈕，用 LINE 登入後即可查看您的 User ID</p>
            <button class="btn" onclick="lineLogin()">使用 LINE 登入</button>
            <div class="info">
                ℹ️ 這個頁面只用來查詢您的 LINE User ID<br>
                不會儲存任何資料
            </div>
        </div>

        <div id="loadingSection" class="loading">
            <p>⏳ 正在取得您的資料...</p>
        </div>

        <div id="resultSection" style="display: none;">
            <p>✅ 您的 LINE User ID 是：</p>
            <div class="user-id" id="userId"></div>
            <button class="btn" onclick="copyUserId()">📋 複製 ID</button>
            <div class="info">
                💡 請把這個 ID 複製起來，<br>
                貼給開發人員設定為最高管理員
            </div>
        </div>

        <div id="errorSection" style="display: none;" class="error">
            <p>❌ 發生錯誤</p>
            <p id="errorMessage"></p>
        </div>
    </div>

    <script>
        // LINE Login 設定
        const LINE_CHANNEL_ID = '2008269293';  // 你的 LINE Login Channel ID
        const REDIRECT_URI = 'https://guimashen.vercel.app/get-my-id.html';  // 等部署後要改成你的網址
        
        // LINE 登入
        function lineLogin() {
            const state = Math.random().toString(36).substring(7);
            const nonce = Math.random().toString(36).substring(7);
            
            const authUrl = `https://access.line.me/oauth2/v2.1/authorize?` +
                `response_type=code&` +
                `client_id=${LINE_CHANNEL_ID}&` +
                `redirect_uri=${encodeURIComponent(REDIRECT_URI)}&` +
                `state=${state}&` +
                `scope=profile%20openid&` +
                `nonce=${nonce}`;
            
            window.location.href = authUrl;
        }

        // 頁面載入時檢查是否有返回的 code
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (code) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('loadingSection').style.display = 'block';
                getUserProfile(code);
            }
        }

        // 取得使用者資料
        async function getUserProfile(code) {
            try {
                // 取得 Access Token
                const tokenResponse = await fetch('https://api.line.me/oauth2/v2.1/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: REDIRECT_URI,
                        client_id: LINE_CHANNEL_ID,
                        client_secret: '025a71c97099343e6e688bb6e393a125'  // 你的 Channel Secret
                    })
                });

                const tokenData = await tokenResponse.json();
                
                if (tokenData.access_token) {
                    // 取得個人資料
                    const profileResponse = await fetch('https://api.line.me/v2/profile', {
                        headers: {
                            'Authorization': `Bearer ${tokenData.access_token}`
                        }
                    });
                    
                    const profile = await profileResponse.json();
                    
                    // 顯示結果
                    document.getElementById('loadingSection').style.display = 'none';
                    document.getElementById('resultSection').style.display = 'block';
                    document.getElementById('userId').textContent = profile.userId;
                    
                } else {
                    throw new Error('無法取得 Access Token');
                }
                
            } catch (error) {
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('errorSection').style.display = 'block';
                document.getElementById('errorMessage').textContent = error.message;
            }
        }

        // 複製 User ID
        function copyUserId() {
            const userId = document.getElementById('userId').textContent;
            navigator.clipboard.writeText(userId).then(() => {
                alert('✅ User ID 已複製到剪貼簿！');
            });
        }
    </script>
</body>
</html>
