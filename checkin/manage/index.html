<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奉香簽到管理後台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: #f9f9f9;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 90%;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #c23636;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .welcome {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .tab {
            padding: 15px 25px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1.1rem;
            font-weight: bold;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: #2196F3;
            border-bottom-color: #2196F3;
        }

        .tab:hover {
            color: #2196F3;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .filters {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #2196F3;
            color: white;
        }

        .btn-primary:hover {
            background: #0b7dda;
        }

        .btn-success {
            background: #4CAF50;
            color: white;
        }

        .btn-success:hover {
            background: #45a049;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #da190b;
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 0.9rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f0f0f0;
            font-weight: bold;
            color: #333;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #e3f2fd;
        }

        .warning-row {
            background: #fff8e1 !important;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2196F3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-access {
            text-align: center;
            padding: 60px 20px;
        }

        .no-access h2 {
            color: #f44336;
            margin-bottom: 15px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
            }

            .filter-group {
                width: 100%;
            }

            table {
                font-size: 0.85rem;
            }

            th, td {
                padding: 8px 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 奉香簽到管理後台</h1>
        </div>

        <!-- 載入中 -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>載入中...</p>
        </div>

        <!-- 無權限 -->
        <div id="noAccess" class="no-access" style="display:none;">
            <h2>🚫 無權限訪問</h2>
            <p>您沒有權限訪問此頁面，請聯絡系統管理員。</p>
            <br>
            <button class="btn btn-primary" onclick="window.location.href='/checkin/'">返回簽到頁面</button>
        </div>

        <!-- 主內容 -->
        <div id="mainContent" style="display:none;">
            <div class="welcome">
                <p>歡迎，<span id="userName">管理者</span>！您的角色：<span id="userRole">載入中...</span></p>
            </div>

            <!-- 導航標籤 -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('records')">簽到記錄</button>
                <button class="tab" onclick="switchTab('patrols')" id="patrolsTab">巡邏點管理</button>
            </div>

            <!-- 簽到記錄 -->
            <div id="recordsTab" class="tab-content active">
                <div class="filters">
                    <div class="filter-group">
                        <label>日期</label>
                        <input type="date" id="filterDate">
                    </div>
                    <div class="filter-group">
                        <label>巡邏點</label>
                        <select id="filterPatrol">
                            <option value="">全部</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>角色</label>
                        <select id="filterRole">
                            <option value="">全部</option>
                            <option value="user">工作同仁</option>
                            <option value="poweruser">管理者</option>
                            <option value="admin">系統管理員</option>
                            <option value="superadmin">最高管理員</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="loadRecords()">查詢</button>
                    <button class="btn btn-success" onclick="exportToExcel()">匯出 Excel</button>
                </div>

                <div id="recordsTable">
                    <table>
                        <thead>
                            <tr>
                                <th>時間</th>
                                <th>姓名</th>
                                <th>角色</th>
                                <th>巡邏點</th>
                                <th>緯度</th>
                                <th>經度</th>
                                <th>距離(m)</th>
                                <th>狀態</th>
                            </tr>
                        </thead>
                        <tbody id="recordsBody">
                            <tr><td colspan="8" style="text-align:center;">請點擊「查詢」載入記錄</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination" id="recordsPagination" style="display:none;">
                    <button class="btn btn-primary btn-small" onclick="prevPage()">上一頁</button>
                    <span id="pageInfo">1 / 1</span>
                    <button class="btn btn-primary btn-small" onclick="nextPage()">下一頁</button>
                </div>
            </div>

            <!-- 巡邏點管理 -->
            <div id="patrolsTab" class="tab-content">
                <button class="btn btn-success" onclick="showAddPatrol()" style="margin-bottom: 20px;">➕ 新增巡邏點</button>

                <div id="patrolsTable">
                    <table>
                        <thead>
                            <tr>
                                <th>名稱</th>
                                <th>經緯度</th>
                                <th>容許誤差(公尺)</th>
                                <th>地圖預覽</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="patrolsBody">
                            <tr><td colspan="5" style="text-align:center;">載入中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, query, where, getDocs, orderBy, limit, doc, getDoc, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBYrg7L1tHWkvC4FyrnA7eZRCpi6B6DDs8",
            authDomain: "checkin-29f7f.firebaseapp.com",
            projectId: "checkin-29f7f",
            storageBucket: "checkin-29f7f.firebasestorage.app",
            messagingSenderId: "698452461679",
            appId: "1:698452461679:web:bd99b65066602e0a92e59a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = null;
        let currentRole = null;
        let allRecords = [];
        let allPatrols = [];
        let currentPage = 1;
        const recordsPerPage = 20;

        // 檢查登入與權限
        async function checkAccess() {
            const profile = localStorage.getItem('lineProfile');
            const role = localStorage.getItem('userRole');

            if (!profile) {
                window.location.href = '/checkin/';
                return;
            }

            currentUser = JSON.parse(profile);
            currentRole = role;

            // 檢查權限（只有 poweruser, admin, superadmin 可訪問）
            if (currentRole !== 'poweruser' && currentRole !== 'admin' && currentRole !== 'superadmin') {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('noAccess').style.display = 'block';
                return;
            }

            // 顯示使用者資訊
            document.getElementById('userName').textContent = currentUser.displayName;
            document.getElementById('userRole').textContent = getRoleName(currentRole);

            // 只有 admin 和 superadmin 可以管理巡邏點
            if (currentRole !== 'admin' && currentRole !== 'superadmin') {
                document.getElementById('patrolsTab').style.display = 'none';
            }

            // 載入初始數據
            await loadPatrolsForFilter();
            await loadPatrols();

            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        }

        // 角色名稱轉換
        function getRoleName(role) {
            const roleMap = {
                'user': '工作同仁',
                'poweruser': '管理者',
                'admin': '系統管理員',
                'superadmin': '最高管理員'
            };
            return roleMap[role] || role;
        }

        // 載入巡邏點（用於篩選器）
        async function loadPatrolsForFilter() {
            const patrolsQuery = query(collection(db, 'patrols'));
            const snapshot = await getDocs(patrolsQuery);
            const select = document.getElementById('filterPatrol');
            
            snapshot.forEach(doc => {
                const data = doc.data();
                const option = document.createElement('option');
                option.value = doc.id;
                option.textContent = data.name;
                select.appendChild(option);
            });
        }

        // 載入簽到記錄
        window.loadRecords = async function() {
            const recordsBody = document.getElementById('recordsBody');
            recordsBody.innerHTML = '<tr><td colspan="8" style="text-align:center;">載入中...</td></tr>';

            try {
                let q = query(collection(db, 'checkins'), orderBy('createdAt', 'desc'));

                const filterDate = document.getElementById('filterDate').value;
                const filterPatrol = document.getElementById('filterPatrol').value;
                const filterRole = document.getElementById('filterRole').value;

                const snapshot = await getDocs(q);
                allRecords = [];

                snapshot.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id;

                    // 客戶端篩選
                    let include = true;

                    if (filterDate) {
                        const recordDate = new Date(data.createdAt).toISOString().split('T')[0];
                        if (recordDate !== filterDate) include = false;
                    }

                    if (filterPatrol && data.patrolId !== filterPatrol) include = false;
                    if (filterRole && data.userRole !== filterRole) include = false;

                    if (include) allRecords.push(data);
                });

                displayRecords();

            } catch (err) {
                console.error('載入記錄錯誤:', err);
                recordsBody.innerHTML = '<tr><td colspan="8" style="text-align:center; color: red;">載入失敗：' + err.message + '</td></tr>';
            }
        };

        // 顯示記錄（分頁）
        function displayRecords() {
            const recordsBody = document.getElementById('recordsBody');
            const start = (currentPage - 1) * recordsPerPage;
            const end = start + recordsPerPage;
            const pageRecords = allRecords.slice(start, end);

            if (pageRecords.length === 0) {
                recordsBody.innerHTML = '<tr><td colspan="8" style="text-align:center;">沒有符合條件的記錄</td></tr>';
                document.getElementById('recordsPagination').style.display = 'none';
                return;
            }

            recordsBody.innerHTML = '';
            pageRecords.forEach(record => {
                const tr = document.createElement('tr');
                if (record.distance > record.allowedError) {
                    tr.className = 'warning-row';
                }

                const time = new Date(record.createdAt).toLocaleString('zh-TW');
                const status = record.distance <= record.allowedError ? '✅' : '⚠️';

                tr.innerHTML = `
                    <td>${time}</td>
                    <td>${record.userName}</td>
                    <td>${getRoleName(record.userRole)}</td>
                    <td>${record.patrolName}</td>
                    <td>${record.latitude.toFixed(6)}</td>
                    <td>${record.longitude.toFixed(6)}</td>
                    <td>${record.distance.toFixed(0)}</td>
                    <td>${status}</td>
                `;
                recordsBody.appendChild(tr);
            });

            // 更新分頁資訊
            const totalPages = Math.ceil(allRecords.length / recordsPerPage);
            document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
            document.getElementById('recordsPagination').style.display = 'flex';
        }

        // 分頁控制
        window.prevPage = function() {
            if (currentPage > 1) {
                currentPage--;
                displayRecords();
            }
        };

        window.nextPage = function() {
            const totalPages = Math.ceil(allRecords.length / recordsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                displayRecords();
            }
        };

        // 匯出 Excel（簡化版）
        window.exportToExcel = function() {
            if (allRecords.length === 0) {
                alert('沒有記錄可匯出');
                return;
            }

            let csv = '\uFEFF時間,姓名,角色,巡邏點,緯度,經度,距離(m),狀態\n';
            allRecords.forEach(record => {
                const time = new Date(record.createdAt).toLocaleString('zh-TW');
                const status = record.distance <= record.allowedError ? '正常' : '超出範圍';
                csv += `${time},${record.userName},${getRoleName(record.userRole)},${record.patrolName},${record.latitude},${record.longitude},${record.distance.toFixed(0)},${status}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `奉香簽到記錄_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        };

        // 載入巡邏點列表
        async function loadPatrols() {
            const patrolsBody = document.getElementById('patrolsBody');

            try {
                const snapshot = await getDocs(collection(db, 'patrols'));
                allPatrols = [];

                snapshot.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id;
                    allPatrols.push(data);
                });

                if (allPatrols.length === 0) {
                    patrolsBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">尚無巡邏點，請點擊「新增巡邏點」</td></tr>';
                    return;
                }

                patrolsBody.innerHTML = '';
                allPatrols.forEach(patrol => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${patrol.name}</td>
                        <td>${patrol.latitude}, ${patrol.longitude}</td>
                        <td>${patrol.allowedError || 50}</td>
                        <td><button class="btn btn-success btn-small" onclick="previewMap('${patrol.latitude}', '${patrol.longitude}', '${patrol.name}')">預覽</button></td>
                        <td class="action-buttons">
                            <button class="btn btn-primary btn-small" onclick="editPatrol('${patrol.id}')">編輯</button>
                            <button class="btn btn-danger btn-small" onclick="deletePatrol('${patrol.id}', '${patrol.name}')">刪除</button>
                        </td>
                    `;
                    patrolsBody.appendChild(tr);
                });

            } catch (err) {
                console.error('載入巡邏點錯誤:', err);
                patrolsBody.innerHTML = '<tr><td colspan="5" style="text-align:center; color: red;">載入失敗：' + err.message + '</td></tr>';
            }
        }

        // 預覽地圖
        window.previewMap = function(lat, lng, name) {
            const url = `https://www.google.com/maps?q=${lat},${lng}&z=18`;
            window.open(url, '_blank', 'width=800,height=600');
        };

        // 新增巡邏點
        window.showAddPatrol = function() {
            const name = prompt('請輸入巡邏點名稱：');
            if (!name) return;

            const coords = prompt('請輸入經緯度（格式：緯度,經度）\n例如：25.148338,121.410871');
            if (!coords) return;

            const parts = coords.split(',');
            if (parts.length !== 2) {
                alert('格式錯誤！請使用：緯度,經度');
                return;
            }

            const lat = parseFloat(parts[0].trim());
            const lng = parseFloat(parts[1].trim());

            if (isNaN(lat) || isNaN(lng)) {
                alert('經緯度必須是數字！');
                return;
            }

            const error = prompt('請輸入容許誤差（公尺）：', '50');
            const allowedError = parseInt(error) || 50;

            // 儲存到 Firestore
            const patrolId = name.replace(/\s/g, '_');
            setDoc(doc(db, 'patrols', patrolId), {
                name: name,
                latitude: lat,
                longitude: lng,
                allowedError: allowedError
            }).then(() => {
                alert('新增成功！');
                loadPatrols();
                loadPatrolsForFilter();
            }).catch(err => {
                alert('新增失敗：' + err.message);
            });
        };

        // 刪除巡邏點
        window.deletePatrol = function(id, name) {
            if (!confirm(`確定要刪除巡邏點「${name}」嗎？`)) return;

            deleteDoc(doc(db, 'patrols', id)).then(() => {
                alert('刪除成功！');
                loadPatrols();
            }).catch(err => {
                alert('刪除失敗：' + err.message);
            });
        };

        // 編輯巡邏點（簡化版）
        window.editPatrol = function(id) {
            alert('編輯功能開發中...');
        };

        // 切換標籤
        window.switchTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            if (tab === 'records') {
                document.querySelector('[onclick="switchTab(\'records\')"]').classList.add('active');
                document.getElementById('recordsTab').classList.add('active');
            } else if (tab === 'patrols') {
                document.querySelector('[onclick="switchTab(\'patrols\')"]').classList.add('active');
                document.getElementById('patrolsTab').classList.add('active');
            }
        };

        // 初始化
        checkAccess();
    </script>
</body>
</html>
