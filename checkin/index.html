<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奉香簽到 - 龜馬山 紫皇天乙真慶宮</title>
    <style>
        /* ========== 全域樣式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ========== 主容器 ========== */
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* ========== 標題 ========== */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h1 {
            color: #c23636;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        /* ========== 使用者資訊 ========== */
        .user-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ddd;
        }

        .user-details h3 {
            color: #333;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .user-details p {
            color: #666;
            font-size: 0.9rem;
        }

        /* ========== 巡邏點資訊 ========== */
        .patrol-info {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .patrol-info h3 {
            color: #1976d2;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .patrol-info p {
            color: #555;
            font-size: 0.9rem;
        }

        /* ========== 按鈕 ========== */
        .btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 0;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-primary:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-line {
            background: #00C300;
            color: white;
        }

        .btn-line:hover {
            background: #00B000;
        }

        /* ========== 結果區塊 ========== */
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .result.success {
            background: #e8f5e9;
            border: 2px solid #4CAF50;
        }

        .result.error {
            background: #ffebee;
            border: 2px solid #f44336;
        }

        .result h2 {
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .result.success h2 {
            color: #4CAF50;
        }

        .result.error h2 {
            color: #f44336;
        }

        .result-details {
            text-align: left;
            margin-top: 15px;
        }

        .result-details p {
            margin: 8px 0;
            color: #555;
            font-size: 0.95rem;
        }

        .result-details strong {
            color: #333;
        }

        /* ========== 提示訊息 ========== */
        .hint {
            background: #fff3cd;
            border-left: 4px solid #ff9800;
            padding: 12px;
            border-radius: 5px;
            margin-top: 15px;
        }

        .hint p {
            color: #856404;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        /* ========== 載入動畫 ========== */
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ========== 響應式 ========== */
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .logo {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 標題 -->
        <div class="header">
            <div class="logo">📍</div>
            <h1>奉香簽到</h1>
        </div>

        <!-- 使用者資訊（登入後顯示） -->
        <div id="user-info" style="display: none;"></div>

        <!-- 巡邏點資訊 -->
        <div id="patrol-info" class="patrol-info">
            <h3>巡邏點：</h3>
            <p id="patrol-name">載入中...</p>
        </div>

        <!-- 主要按鈕 -->
        <div id="main-button"></div>

        <!-- 結果顯示 -->
        <div id="result"></div>

        <!-- 提示訊息 -->
        <div class="hint">
            <p>⚠️ 若按鈕無反應，請點右上角「⋯」→「在瀏覽器中開啟」</p>
        </div>
    </div>

    <!-- 載入共用設定 -->
    <script src="/config/superadmin.js"></script>

    <script type="module">
        // ═══════════════════════════════════════════════════════════════
        // 奉香簽到核心功能（從 Firebase 動態讀取巡邏點）
        // ═══════════════════════════════════════════════════════════════

        // Firebase 設定
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, addDoc, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBYrg7L1tHWkvC4FyrnA7eZRCpi6B6DDs8",
            authDomain: "checkin-29f7f.firebaseapp.com",
            projectId: "checkin-29f7f",
            storageBucket: "checkin-29f7f.firebasestorage.app",
            messagingSenderId: "698452461679",
            appId: "1:698452461679:web:bd99b65066602e0a92e59a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LINE Login 設定
        const LINE_LOGIN_CHANNEL_ID = '2008269293';
        const REDIRECT_URI = 'https://guimashen.vercel.app/auth/callback';

        // 全域變數
        let currentUser = null;
        let currentPatrol = null;
        let userRole = 'user';

        // 初始化
        async function init() {
            try {
                // 取得網址參數中的巡邏點名稱
                const urlParams = new URLSearchParams(window.location.search);
                const patrolName = urlParams.get('patrol');

                if (patrolName) {
                    // 從 Firebase 讀取巡邏點資料
                    document.getElementById('patrol-name').textContent = `${patrolName}（載入中...）`;
                    currentPatrol = await loadPatrolFromFirebase(patrolName);
                    
                    if (currentPatrol) {
                        document.getElementById('patrol-name').textContent = currentPatrol.name;
                        console.log('✅ 巡邏點資料:', currentPatrol);
                    } else {
                        document.getElementById('patrol-name').textContent = `❌ 找不到巡邏點：${patrolName}`;
                        console.error('找不到巡邏點:', patrolName);
                    }
                } else {
                    document.getElementById('patrol-name').textContent = '未指定巡邏點';
                }

                // 檢查登入狀態
                const lineUserId = localStorage.getItem('line_user_id');
                const displayName = localStorage.getItem('line_display_name');
                const pictureUrl = localStorage.getItem('line_picture_url');

                if (lineUserId) {
                    // 已登入，顯示使用者資訊
                    currentUser = {
                        userId: lineUserId,
                        displayName: displayName,
                        pictureUrl: pictureUrl
                    };

                    // 從 Firebase 取得使用者角色
                    const userDoc = await getDoc(doc(db, 'users', lineUserId));
                    if (userDoc.exists()) {
                        userRole = userDoc.data().role || 'user';
                    }

                    showUserInfo();
                    showCheckinButton();
                } else {
                    // 未登入，顯示登入按鈕
                    showLoginButton();
                }
            } catch (error) {
                console.error('❌ 初始化失敗:', error);
                document.getElementById('patrol-name').textContent = '載入失敗：' + error.message;
            }
        }

        // 從 Firebase 讀取巡邏點資料
        async function loadPatrolFromFirebase(patrolName) {
            try {
                console.log('🔍 讀取巡邏點:', patrolName);
                const patrolDoc = await getDoc(doc(db, 'patrols', patrolName));
                
                if (patrolDoc.exists()) {
                    const data = patrolDoc.data();
                    console.log('📍 巡邏點資料:', data);
                    return {
                        name: data.name,
                        lat: data.lat,
                        lng: data.lng,
                        tolerance: data.tolerance || 50
                    };
                } else {
                    console.error('❌ 文件不存在:', patrolName);
                    return null;
                }
            } catch (error) {
                console.error('❌ 讀取巡邏點失敗:', error);
                return null;
            }
        }

        // 顯示使用者資訊
        function showUserInfo() {
            const userInfoDiv = document.getElementById('user-info');
            userInfoDiv.style.display = 'flex';
            userInfoDiv.className = 'user-info';
            userInfoDiv.innerHTML = `
                <img src="${currentUser.pictureUrl || '/default-avatar.png'}" 
                     alt="使用者頭像" 
                     class="user-avatar"
                     onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2240%22 fill=%22%23999%22%3E👤%3C/text%3E%3C/svg%3E'">
                <div class="user-details">
                    <h3>您好，${currentUser.displayName}！</h3>
                    <p>角色：${getRoleDisplayName(userRole)}</p>
                </div>
            `;
        }

        // 取得角色顯示名稱
        function getRoleDisplayName(role) {
            const roleNames = {
                'superadmin': '最高系統管理員',
                'admin': '系統管理員',
                'poweruser': '管理者',
                'user': '工作同仁'
            };
            return roleNames[role] || '工作同仁';
        }

        // 顯示登入按鈕
        function showLoginButton() {
            const buttonDiv = document.getElementById('main-button');
            buttonDiv.innerHTML = `
                <button class="btn btn-line" onclick="handleLineLogin()">
                    使用 LINE 帳號登入
                </button>
            `;
        }

        // 顯示簽到按鈕
        function showCheckinButton() {
            const buttonDiv = document.getElementById('main-button');
            const isDisabled = !currentPatrol;
            
            buttonDiv.innerHTML = `
                <button class="btn btn-primary" 
                        onclick="handleCheckin()" 
                        id="checkin-btn"
                        ${isDisabled ? 'disabled' : ''}>
                    ${isDisabled ? '請掃描巡邏點 QR Code' : '取得定位並簽到'}
                </button>
            `;
        }

        // 處理 LINE 登入
        window.handleLineLogin = function() {
            const state = encodeURIComponent(JSON.stringify({
                redirect: window.location.href
            }));

            const authUrl = `https://access.line.me/oauth2/v2.1/authorize?` +
                `response_type=code` +
                `&client_id=${LINE_LOGIN_CHANNEL_ID}` +
                `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
                `&state=${state}` +
                `&scope=profile%20openid`;

            window.location.href = authUrl;
        };

        // 處理簽到
        window.handleCheckin = async function() {
            if (!currentPatrol) {
                showResult('error', '❌ 未指定巡邏點', '請掃描正確的巡邏點 QR Code');
                return;
            }

            // 禁用按鈕
            const btn = document.getElementById('checkin-btn');
            btn.disabled = true;
            btn.textContent = '定位中...';

            try {
                // 取得 GPS 位置
                const position = await getCurrentPosition();
                const userLat = position.coords.latitude;
                const userLng = position.coords.longitude;

                console.log('📍 使用者位置:', userLat, userLng);
                console.log('🎯 巡邏點位置:', currentPatrol.lat, currentPatrol.lng);

                // 計算距離
                const distance = calculateDistance(
                    userLat, userLng,
                    currentPatrol.lat, currentPatrol.lng
                );

                console.log('📏 距離:', distance.toFixed(1), '公尺');

                // 檢查是否需要 GPS 驗證
                const requiresGPS = (userRole === 'user');

                // 驗證距離（如果需要 GPS）
                if (requiresGPS && distance > currentPatrol.tolerance) {
                    showResult(
                        'error',
                        '❌ 位置不符：您不在巡邏點附近',
                        `您的座標：${userLat.toFixed(6)}, ${userLng.toFixed(6)}\n` +
                        `巡邏點座標：${currentPatrol.lat}, ${currentPatrol.lng}\n` +
                        `容許誤差：±${currentPatrol.tolerance} 公尺\n` +
                        `實際距離：${distance.toFixed(1)} 公尺\n\n` +
                        `請移動到正確位置並重新嘗試`
                    );
                    btn.disabled = false;
                    btn.textContent = '重新嘗試定位';
                    return;
                }

                // 儲存簽到記錄
                await saveCheckin(userLat, userLng, distance, requiresGPS);

                // 顯示成功訊息
                const now = new Date();
                showResult(
                    'success',
                    '✅ 奉香成功！',
                    `地點：${currentPatrol.name}\n` +
                    `時間：${now.toLocaleString('zh-TW')}\n` +
                    `座標：${userLat.toFixed(6)}, ${userLng.toFixed(6)}\n` +
                    (requiresGPS ? `距離：${distance.toFixed(1)} 公尺\n` : '') +
                    `系統將自動上傳記錄`
                );

                btn.style.display = 'none';

            } catch (error) {
                console.error('❌ 簽到失敗:', error);
                let errorMessage = '未知錯誤';

                if (error.code === 1) {
                    errorMessage = '請允許定位權限';
                } else if (error.code === 2) {
                    errorMessage = '無法取得位置資訊';
                } else if (error.code === 3) {
                    errorMessage = '定位逾時';
                } else {
                    errorMessage = error.message || '系統錯誤';
                }

                showResult(
                    'error',
                    '❌ 無法定位',
                    errorMessage + '\n錯誤碼：' + (error.code || 'UNKNOWN') + '\n\n請檢查手機設定並重新嘗試'
                );

                btn.disabled = false;
                btn.textContent = '重新嘗試定位';
            }
        };

        // 取得目前位置
        function getCurrentPosition() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('此裝置不支援定位功能'));
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    resolve,
                    reject,
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            });
        }

        // 計算兩點距離（Haversine formula）
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // 地球半徑（公尺）
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c; // 距離（公尺）
        }

        // 儲存簽到記錄
        async function saveCheckin(lat, lng, distance, requiresGPS) {
            const checkinData = {
                userId: currentUser.userId,
                displayName: currentUser.displayName,
                role: userRole,
                patrolName: currentPatrol.name,
                latitude: lat,
                longitude: lng,
                distance: distance,
                requiresGPS: requiresGPS,
                timestamp: new Date().toISOString(),
                createdAt: new Date()
            };

            await addDoc(collection(db, 'checkins'), checkinData);
            console.log('✅ 簽到記錄已儲存:', checkinData);
        }

        // 顯示結果
        function showResult(type, title, message) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.innerHTML = `
                <h2>${title}</h2>
                <div class="result-details">
                    ${message.split('\n').map(line => `<p>${line}</p>`).join('')}
                </div>
            `;
        }

        // 執行初始化
        init();
    </script>
</body>
</html>
