<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奉香簽到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: #f9f9f9;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #c23636;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .welcome {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .patrol-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .patrol-info p {
            color: #333;
            font-size: 1.1rem;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-line {
            background: #00C300;
            color: white;
        }

        .btn-line:hover {
            background: #00B000;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
        }

        .btn-primary:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        .warning {
            background: #fff3cd;
            border-left: 4px solid #ff9800;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .warning p {
            color: #856404;
            font-size: 0.9rem;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .result.success {
            background: #d4edda;
            border-left: 4px solid #4CAF50;
        }

        .result.error {
            background: #f8d7da;
            border-left: 4px solid #f44336;
        }

        .result h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .result p {
            margin-bottom: 8px;
            color: #333;
        }

        .loading {
            text-align: center;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2196F3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📍 奉香簽到</h1>
        </div>

        <!-- 未登入狀態 -->
        <div id="notLoggedIn" style="display:none;">
            <div class="welcome">
                <p>您好！請先登入 LINE 以開始奉香簽到。</p>
            </div>
            <button class="btn btn-line" onclick="loginWithLine()">使用 LINE 帳號登入</button>
            <div class="warning">
                <p>⚠️ 登入後,您將被導回此頁面繼續簽到流程。</p>
            </div>
        </div>

        <!-- 已登入狀態 -->
        <div id="loggedIn" style="display:none;">
            <div class="welcome" id="welcomeMsg">
                <p>您好，<span id="userName">載入中...</span>！</p>
            </div>

            <div class="patrol-info">
                <p id="patrolName">巡邏點：載入中...</p>
            </div>

            <button id="checkinBtn" class="btn btn-primary" onclick="doCheckin()" disabled>
                取得定位並簽到
            </button>

            <div class="warning" id="warningMsg">
                <p>⚠️ 若按鈕無反應，請點右上角「⋯」→「在瀏覽器中開啟」</p>
            </div>

            <div id="result"></div>
        </div>

        <!-- 載入中 -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>載入中...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBYrg7L1tHWkvC4FyrnA7eZRCpi6B6DDs8",
            authDomain: "checkin-29f7f.firebaseapp.com",
            projectId: "checkin-29f7f",
            storageBucket: "checkin-29f7f.firebasestorage.app",
            messagingSenderId: "698452461679",
            appId: "1:698452461679:web:bd99b65066602e0a92e59a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const LINE_CHANNEL_ID = '2008269293';
        const REDIRECT_URI = window.location.origin + '/auth/callback/';

        let currentPatrol = null;
        let userProfile = null;
        let userRole = null;

        // 檢查登入狀態
        async function checkLoginStatus() {
            const profile = localStorage.getItem('lineProfile');
            const role = localStorage.getItem('userRole');

            if (profile) {
                userProfile = JSON.parse(profile);
                userRole = role || 'user';

                // 顯示已登入界面
                document.getElementById('loading').style.display = 'none';
                document.getElementById('loggedIn').style.display = 'block';
                document.getElementById('userName').textContent = userProfile.displayName;

                // 載入巡邏點
                await loadPatrol();
            } else {
                // 顯示未登入界面
                document.getElementById('loading').style.display = 'none';
                document.getElementById('notLoggedIn').style.display = 'block';
            }
        }

        // 載入巡邏點資訊
        async function loadPatrol() {
            const urlParams = new URLSearchParams(window.location.search);
            const patrolParam = urlParams.get('patrol');

            if (!patrolParam) {
                document.getElementById('patrolName').textContent = '巡邏點：未指定（請掃描 QR Code）';
                return;
            }

            try {
                const patrolRef = doc(db, 'patrols', patrolParam);
                const patrolDoc = await getDoc(patrolRef);

                if (patrolDoc.exists()) {
                    currentPatrol = patrolDoc.data();
                    currentPatrol.id = patrolParam;
                    document.getElementById('patrolName').textContent = `巡邏點：${currentPatrol.name}`;
                    document.getElementById('checkinBtn').disabled = false;
                } else {
                    document.getElementById('patrolName').textContent = '巡邏點：找不到此巡邏點';
                }
            } catch (err) {
                console.error('載入巡邏點錯誤:', err);
                document.getElementById('patrolName').textContent = '巡邏點：載入失敗';
            }
        }

        // LINE 登入
        window.loginWithLine = function() {
            const state = 'checkin';
            const nonce = Math.random().toString(36).substring(7);
            const lineAuthUrl = `https://access.line.me/oauth2/v2.1/authorize?response_type=code&client_id=${LINE_CHANNEL_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&state=${state}&scope=profile%20openid&nonce=${nonce}`;
            window.location.href = lineAuthUrl;
        };

        // 執行簽到
        window.doCheckin = async function() {
            if (!currentPatrol) {
                showResult('error', '❌ 簽到失敗', ['請先掃描 QR Code 指定巡邏點']);
                return;
            }

            const btn = document.getElementById('checkinBtn');
            btn.disabled = true;
            btn.textContent = '定位中...';

            document.getElementById('result').innerHTML = '<p>正在取得定位...</p>';

            // 取得 GPS 定位
            if (!navigator.geolocation) {
                showResult('error', '❌ 您的裝置不支援定位功能', []);
                btn.disabled = false;
                btn.textContent = '重新嘗試定位';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;

                    // 計算距離
                    const distance = calculateDistance(
                        userLat, userLng,
                        currentPatrol.latitude, currentPatrol.longitude
                    );

                    const allowedError = currentPatrol.allowedError || 50;

                    if (distance > allowedError) {
                        showResult('error', '❌ 位置不符：您不在巡邏點附近', [
                            `您的座標：${userLat.toFixed(6)}, ${userLng.toFixed(6)}`,
                            `巡邏點座標：${currentPatrol.latitude}, ${currentPatrol.longitude}`,
                            `容許誤差：±${allowedError} 公尺`,
                            `實際距離：${distance.toFixed(0)} 公尺`,
                            '請移動到正確位置並重新嘗試'
                        ]);
                        btn.disabled = false;
                        btn.textContent = '重新嘗試定位';
                        return;
                    }

                    // 儲存簽到記錄
                    try {
                        const checkinData = {
                            userId: userProfile.userId,
                            userName: userProfile.displayName,
                            userRole: userRole,
                            patrolId: currentPatrol.id,
                            patrolName: currentPatrol.name,
                            latitude: userLat,
                            longitude: userLng,
                            targetLatitude: currentPatrol.latitude,
                            targetLongitude: currentPatrol.longitude,
                            distance: distance,
                            allowedError: allowedError,
                            timestamp: serverTimestamp(),
                            createdAt: new Date().toISOString()
                        };

                        await addDoc(collection(db, 'checkins'), checkinData);

                        const now = new Date();
                        const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

                        showResult('success', '✅ 奉香成功！', [
                            `地點：${currentPatrol.name}`,
                            `時間：${timeStr}`,
                            `座標：${userLat.toFixed(6)}, ${userLng.toFixed(6)}`,
                            '系統將自動上傳記錄'
                        ]);

                        btn.style.display = 'none';
                        document.getElementById('warningMsg').style.display = 'none';

                    } catch (err) {
                        console.error('儲存簽到記錄錯誤:', err);
                        showResult('error', '❌ 系統錯誤：無法上傳記錄', [
                            `錯誤訊息：${err.message}`,
                            '請檢查網路連線並重新嘗試'
                        ]);
                        btn.disabled = false;
                        btn.textContent = '重新嘗試上傳';
                    }
                },
                (error) => {
                    let errorMsg = '未知
