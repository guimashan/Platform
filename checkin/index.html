<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龜馬山紫皇天乙真慶宮 奉香簽到系統</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome 圖示庫 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* 自定義樣式 */
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent; /* 移除行動裝置點擊高亮效果 */
        }
        .btn-line {
            background-color: #06C755;
            transition: background-color 0.3s ease;
        }
        .btn-line:hover {
            background-color: #05a546;
        }
        .btn-line:active, .btn-checkin:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="loading-spinner" class="text-center">
        <i class="fas fa-spinner fa-spin fa-3x text-gray-500"></i>
        <p class="mt-4 text-gray-600">頁面載入中，請稍候...</p>
    </div>

    <main id="main-content" class="hidden w-full max-w-md mx-auto p-8 bg-white rounded-2xl shadow-lg text-center">
        
        <!-- 登入畫面 -->
        <div id="login-view">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">📍 奉香簽到系統</h1>
            <p class="text-gray-500 mb-8">龜馬山紫皇天乙真慶宮</p>
            <button id="line-login-btn" class="w-full btn-line text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center text-lg shadow-md focus:outline-none focus:ring-2 focus:ring-green-400 focus:ring-opacity-75">
                <i class="fab fa-line mr-3 text-2xl"></i>
                使用 LINE 帳號登入
            </button>
            <p class="text-xs text-gray-400 mt-6">💡 建議使用 Chrome 或 Safari 瀏覽器以獲得最佳體驗。</p>
        </div>

        <!-- 簽到主畫面 (登入後顯示) -->
        <div id="checkin-view" class="hidden">
            <div id="user-profile" class="mb-8">
                <img id="user-picture" src="https://placehold.co/100x100/E2E8F0/A0AEC0?text=Avatar" alt="User Avatar" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-gray-200">
                <h2 class="text-xl font-bold text-gray-800">您好, <span id="user-name">使用者</span>！</h2>
                <p class="text-sm text-gray-500">角色：<span id="user-role">載入中...</span></p>
            </div>
            
            <div id="patrol-point-info" class="mb-8 p-4 bg-gray-50 rounded-lg">
                 <h3 class="text-lg font-semibold text-gray-700">目前巡邏點</h3>
                 <p id="patrol-point-name" class="text-2xl font-bold text-blue-600">龜馬山辦公室</p>
            </div>

            <button id="checkin-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center text-lg shadow-md transition-transform duration-200 btn-checkin focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-opacity-75">
                <i class="fas fa-map-marker-alt mr-3"></i>
                取得定位並簽到
            </button>

            <button id="logout-btn" class="w-full mt-4 bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg text-sm transition-colors">
                登出
            </button>
        </div>

    </main>

    <script type="module">
        // Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 設定區 ---
        // !!重要!! 請務必填入您 Firebase 專案的真實設定
        const firebaseConfig = {
            apiKey: "AIzaSyBYrg7L1tHWkvC4FyrnA7eZRCpi6B6DDs8", // 請替換
            authDomain: "checkin-29f7f.firebaseapp.com",
            projectId: "checkin-29f7f",
            storageBucket: "checkin-29f7f.appspot.com",
            messagingSenderId: "698452461679",
            appId: "1:698452461679:web:bd99b65066602e0a92e59a"
        };

        const LINE_LOGIN_CHANNEL_ID = '2008269293';
        const LINE_REDIRECT_URI = 'https://go.guimashan.org.tw/checkin/index.html';

        // --- DOM 元素 ---
        const loadingSpinner = document.getElementById('loading-spinner');
        const mainContent = document.getElementById('main-content');
        const loginView = document.getElementById('login-view');
        const checkinView = document.getElementById('checkin-view');
        const lineLoginBtn = document.getElementById('line-login-btn');
        const userPicture = document.getElementById('user-picture');
        const userName = document.getElementById('user-name');
        const userRole = document.getElementById('user-role');
        const logoutBtn = document.getElementById('logout-btn');
        
        // --- 初始化 Firebase ---
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // --- 主要邏輯 ---

        // 頁面載入後立即執行
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('code') && params.has('state')) {
                // 如果 URL 帶有 code 和 state，表示是從 LINE 登入後跳轉回來的
                await handleLineLoginCallback(params.get('code'), params.get('state'));
            } else {
                // 正常載入頁面，檢查是否有本地端登入記錄
                const userData = getSession();
                if (userData) {
                    console.log('找到 localStorage 中的使用者資料:', userData);
                    displayUserInfo(userData);
                    showView('checkin');
                } else {
                    showView('login');
                }
            }
        });

        // LINE 登入按鈕點擊事件
        lineLoginBtn.addEventListener('click', () => {
            const state = generateState();
            localStorage.setItem('line_login_state', state); // 儲存 state 以供後續驗證
            const loginUrl = `https://access.line.me/oauth2/v2.1/authorize?` +
                `response_type=code` +
                `&client_id=${LINE_LOGIN_CHANNEL_ID}` +
                `&redirect_uri=${encodeURIComponent(LINE_REDIRECT_URI)}` +
                `&state=${state}` +
                `&scope=profile%20openid`;
            window.location.href = loginUrl;
        });
        
        // 登出按鈕點擊事件
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('guimashan_user'); // 清除本地登入記錄
            window.location.href = window.location.pathname; // 重新整理頁面到登入狀態
        });

        // --- 核心功能函式 ---

        // 處理從 LINE 登入後的回呼
        async function handleLineLoginCallback(code, state) {
            const storedState = localStorage.getItem('line_login_state');
            if (state !== storedState) {
                alert('登入驗證失敗，請重試。 (State mismatch)');
                showView('login');
                return;
            }
            localStorage.removeItem('line_login_state');

            showLoadingMessage('正在驗證 LINE 身分...');

            try {
                // 呼叫我們的後端 API，將 code 傳過去
                const response = await fetch('/api/line-auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code }),
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`LINE 登入失敗: ${errorData.details || response.statusText}`);
                }
                
                const lineProfile = await response.json();
                
                showLoadingMessage('正在同步使用者資料...');

                // 檢查/建立使用者於 Firebase
                const userRef = doc(db, 'users', lineProfile.userId);
                const userSnap = await getDoc(userRef);

                let userData;
                if (userSnap.exists()) {
                    // 使用者已存在，更新最後登入時間和個人資料
                    const existingData = userSnap.data();
                    userData = { ...existingData, lastLoginAt: new Date().toISOString(), displayName: lineProfile.displayName, pictureUrl: lineProfile.pictureUrl };
                    await setDoc(userRef, { lastLoginAt: userData.lastLoginAt, displayName: userData.displayName, pictureUrl: userData.pictureUrl }, { merge: true });
                } else {
                    // 新使用者，建立資料並設定預設角色為 'user'
                    userData = {
                        userId: lineProfile.userId,
                        displayName: lineProfile.displayName,
                        pictureUrl: lineProfile.pictureUrl,
                        role: 'user',
                        createdAt: new Date().toISOString(),
                        lastLoginAt: new Date().toISOString(),
                    };
                    await setDoc(userRef, userData);
                }
                
                saveSession(userData);
                displayUserInfo(userData);
                history.replaceState({}, document.title, window.location.pathname); // 清理 URL
                showView('checkin');

            } catch (error) {
                console.error('處理 LINE 登入回呼時發生錯誤:', error);
                alert(`登入時發生錯誤: ${error.message}`);
                showView('login');
            }
        }
        
        // --- 輔助及 UI 函式 ---
        
        function displayUserInfo(userData) {
            userName.textContent = userData.displayName || '使用者';
            userPicture.src = userData.pictureUrl || 'https://placehold.co/100x100/E2E8F0/A0AEC0?text=Avatar';
            userRole.textContent = mapRoleToChinese(userData.role);
        }

        function saveSession(userData) {
            localStorage.setItem('guimashan_user', JSON.stringify(userData));
        }

        function getSession() {
            const userData = localStorage.getItem('guimashan_user');
            return userData ? JSON.parse(userData) : null;
        }

        function showLoadingMessage(message) {
            loadingSpinner.classList.remove('hidden');
            mainContent.classList.add('hidden');
            loadingSpinner.querySelector('p').textContent = message;
        }

        function showView(viewName) {
            loadingSpinner.classList.add('hidden');
            mainContent.classList.remove('hidden');
            loginView.classList.add('hidden');
            checkinView.classList.add('hidden');
            if (viewName === 'login') loginView.classList.remove('hidden');
            else if (viewName === 'checkin') checkinView.classList.remove('hidden');
        }
        
        function mapRoleToChinese(role) {
            const roles = { user: '工作人員/工作同仁', poweruser: '管理者', admin: '系統管理員', superadmin: '最高系統管理員' };
            return roles[role] || '未知角色';
        }

        function generateState() {
            const array = new Uint32Array(8);
            window.crypto.getRandomValues(array);
            return Array.from(array, dec => ('0' + dec.toString(16)).substr(-2)).join('');
        }

    </script>
</body>
</html>
