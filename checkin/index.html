<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龜馬山紫皇天乙真慶宮 奉香簽到</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .spinner { border-top-color: #3498db; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div id="main-container" class="w-full max-w-md">
        <div id="app-card" class="bg-white rounded-xl shadow-lg p-6 md:p-8 text-center">
            <!-- Loading View -->
            <div id="loading-view">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-gray-900 mx-auto spinner"></div>
                <p id="loading-text" class="mt-4 text-gray-600">正在初始化...</p>
            </div>
            <!-- Login View -->
            <div id="login-view" class="hidden">
                <h1 class="text-2xl font-bold text-gray-800 mb-2">奉香簽到系統</h1>
                <p class="text-gray-500 mb-8">龜馬山紫皇天乙真慶宮</p>
                <button id="login-btn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center">
                    <i class="fab fa-line text-2xl mr-3"></i> 使用 LINE 帳號登入
                </button>
            </div>
            <!-- Check-in View -->
            <div id="checkin-view" class="hidden">
                 <div class="flex items-center justify-between mb-6">
                    <h1 class="text-2xl font-bold text-gray-800">奉香簽到</h1>
                    <button id="logout-btn" class="text-sm text-gray-500 hover:text-gray-700">登出</button>
                </div>
                <div class="bg-gray-50 rounded-lg p-4 mb-6 text-left">
                    <div class="flex items-center">
                        <img id="user-avatar" src="https://placehold.co/50x50" class="w-12 h-12 rounded-full mr-4">
                        <div>
                            <p id="user-name" class="font-bold text-gray-800"></p>
                            <p id="user-role" class="text-sm text-gray-500"></p>
                        </div>
                    </div>
                </div>
                <div id="patrol-info" class="bg-blue-50 border-l-4 border-blue-400 rounded-lg p-4 mb-6 text-left">
                    <p class="text-sm text-blue-800">目前巡邏點</p>
                    <p id="patrol-name" class="text-xl font-bold text-blue-900">載入中...</p>
                </div>
                <button id="checkin-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg disabled:bg-gray-400" disabled>
                    <i class="fas fa-map-marker-alt mr-2"></i> 取得定位並簽到
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBYrg7L1tHWkvC4FyrnA7eZRCpi6B6DDs8",
            authDomain: "checkin-29f7f.firebaseapp.com",
            projectId: "checkin-29f7f",
            storageBucket: "checkin-29f7f.appspot.com",
            messagingSenderId: "698452461679",
            appId: "1:698452461679:web:bd99b65066602e0a92e59a"
        };
        const lineClientId = '2008269293';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loadingView = document.getElementById('loading-view');
        const loadingText = document.getElementById('loading-text');
        const loginView = document.getElementById('login-view');
        const checkinView = document.getElementById('checkin-view');
        const checkinBtn = document.getElementById('checkin-btn');

        // This is the single source of truth for the redirect URI
        const REDIRECT_URI = `${window.location.origin}/checkin/`;

        function showView(viewToShow) {
            loadingView.classList.add('hidden');
            loginView.classList.add('hidden');
            checkinView.classList.add('hidden');
            viewToShow.classList.remove('hidden');
        }

        function handleLineRedirect() {
            const state = Date.now().toString();
            localStorage.setItem('line_login_state', state);
            const scope = 'profile openid';
            const authUrl = `https://access.line.me/oauth2/v2.1/authorize?response_type=code&client_id=${lineClientId}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&state=${state}&scope=${scope}`;
            window.location.href = authUrl;
        }

        async function processLineCallback(code, state) {
            loadingText.textContent = '正在驗證 LINE 身分...';
            const localState = localStorage.getItem('line_login_state');
            if (state !== localState) {
                alert('登入驗證失敗，請重試。');
                window.location.href = REDIRECT_URI;
                return;
            }
            localStorage.removeItem('line_login_state');

            try {
                const response = await fetch('/api/line-auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, redirect_uri: REDIRECT_URI }),
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.details || '從後端取得 Firebase 令牌失敗');
                
                loadingText.textContent = '正在登入系統...';
                await signInWithCustomToken(auth, data.token);
                // onAuthStateChanged will handle the rest
            } catch (error) {
                console.error('Callback 處理失敗:', error);
                alert(`登入失敗：${error.message}`);
                window.location.href = REDIRECT_URI;
            }
        }
        
        async function displayCheckinView(user) {
            try {
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) throw new Error("在資料庫中找不到您的使用者設定檔。");

                const currentUserData = userSnap.data();
                document.getElementById('user-avatar').src = currentUserData.pictureUrl;
                document.getElementById('user-name').textContent = `您好，${currentUserData.displayName}！`;
                const roles = { user: '工作人員/工作同仁', poweruser: '管理者', admin: '系統管理員', superadmin: '最高系統管理員' };
                document.getElementById('user-role').textContent = `角色：${roles[currentUserData.role] || '未知'}`;

                showView(checkinView);
                await loadPatrolPoint();

            } catch (error) {
                 console.error("顯示簽到頁面失敗:", error);
                 alert("無法載入您的使用者資訊，將為您登出，請稍後再試。");
                 window.history.replaceState({}, document.title, REDIRECT_URI);
                 await signOut(auth);
            }
        }

        async function loadPatrolPoint() {
            const patrolNameEl = document.getElementById('patrol-name');
            checkinBtn.disabled = true;
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const patrolId = urlParams.get('patrolId');
                let patrolSnap;
                if (patrolId) {
                    patrolSnap = await getDoc(doc(db, "patrols", patrolId));
                } else {
                    const q = query(collection(db, "patrols"), where("name", "==", "龜馬山辦公室"));
                    const querySnapshot = await getDocs(q);
                    if (!querySnapshot.empty) {
                        patrolSnap = querySnapshot.docs[0];
                    }
                }

                if (patrolSnap && patrolSnap.exists()) {
                    patrolNameEl.textContent = patrolSnap.data().name;
                    checkinBtn.disabled = false; // Enable button on success
                } else {
                    patrolNameEl.textContent = patrolId ? '找不到該巡邏點' : '請先建立「龜馬山辦公室」預設巡邏點';
                    patrolNameEl.classList.add('text-red-500');
                }
            } catch (error) {
                console.error("載入巡邏點失敗:", error);
                patrolNameEl.textContent = '載入巡邏點時發生錯誤';
                patrolNameEl.classList.add('text-red-500');
            }
        }

        const unsubscribe = onAuthStateChanged(auth, (user) => {
            unsubscribe(); // Run only once to get initial state
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');

            if (user) {
                const redirectUrl = localStorage.getItem('login_redirect_url');
                if (redirectUrl) {
                    localStorage.removeItem('login_redirect_url');
                    window.location.href = redirectUrl;
                } else {
                    if (code || state) {
                        // Clean up URL params from LINE redirect
                        window.history.replaceState({}, document.title, REDIRECT_URI);
                    }
                    displayCheckinView(user);
                }
            } else {
                if (code && state) {
                    processLineCallback(code, state);
                } else {
                    showView(loginView);
                }
            }
        });

        document.getElementById('login-btn').addEventListener('click', handleLineRedirect);
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth);
            localStorage.removeItem('login_redirect_url');
        });
    </script>
</body>
</html>
