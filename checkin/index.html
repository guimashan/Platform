<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龜馬山紫皇天乙真慶宮 奉香簽到系統</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome 圖示庫 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* 自定義樣式 */
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent; /* 移除行動裝置點擊高亮效果 */
        }
        .btn-line {
            background-color: #06C755;
            transition: background-color 0.3s ease;
        }
        .btn-line:hover {
            background-color: #05a546;
        }
        .btn-line:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div id="loading-spinner" class="text-center">
        <i class="fas fa-spinner fa-spin fa-3x text-gray-500"></i>
        <p class="mt-4 text-gray-600">頁面載入中，請稍候...</p>
    </div>

    <main id="main-content" class="hidden w-full max-w-md mx-auto p-8 bg-white rounded-2xl shadow-lg text-center">
        
        <!-- 登入畫面 -->
        <div id="login-view">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">📍 奉香簽到系統</h1>
            <p class="text-gray-500 mb-8">龜馬山紫皇天乙真慶宮</p>
            <button id="line-login-btn" class="w-full btn-line text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center text-lg shadow-md focus:outline-none focus:ring-2 focus:ring-green-400 focus:ring-opacity-75">
                <i class="fab fa-line mr-3 text-2xl"></i>
                使用 LINE 帳號登入
            </button>
            <p class="text-xs text-gray-400 mt-6">💡 建議使用 Chrome 或 Safari 瀏覽器以獲得最佳體驗。</p>
        </div>

        <!-- 簽到主畫面 (登入後顯示) -->
        <div id="checkin-view" class="hidden">
             <!-- 這裡將會放置登入後的使用者資訊和簽到按鈕 -->
             <p>成功登入！簽到功能開發中...</p>
        </div>

    </main>

    <script type="module">
        // Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 設定區 ---
        // 請將此處的資訊替換成您的 Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyD... YOUR ...", // 請替換
            authDomain: "checkin-29f7f.firebaseapp.com",
            projectId: "checkin-29f7f",
            storageBucket: "checkin-29f7f.appspot.com",
            messagingSenderId: "698452461679",
            appId: "1:698452461679:web:bd99b65066602e0a92e59a"
        };

        const LINE_LOGIN_CHANNEL_ID = '2008269293';
        // !!重要!! 這個網址必須與您在 LINE Developers 後台設定的 Callback URL 完全一致
        const LINE_REDIRECT_URI = 'https://go.guimashan.org.tw/checkin/index.html'; // 暫定為當前頁面，方便開發

        // --- DOM 元素 ---
        const loadingSpinner = document.getElementById('loading-spinner');
        const mainContent = document.getElementById('main-content');
        const loginView = document.getElementById('login-view');
        const checkinView = document.getElementById('checkin-view');
        const lineLoginBtn = document.getElementById('line-login-btn');
        
        // --- 主要邏輯 ---

        // 1. 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // 頁面載入後執行
        document.addEventListener('DOMContentLoaded', () => {
            // 檢查 URL 中是否有從 LINE 登入後帶回來的 code
            const params = new URLSearchParams(window.location.search);
            if (params.has('code')) {
                // 如果有 code，代表是從 LINE 登入後跳轉回來的
                // 此處應處理後續的 token 換取和使用者資料獲取
                // (下一步驟開發)
                console.log("從 LINE 返回，授權碼 (code):", params.get('code'));
                // 顯示簽到畫面 (暫時)
                showView('checkin');
            } else {
                // 如果沒有 code，就是正常進入頁面
                // 檢查使用者登入狀態 (暫時先顯示登入按鈕)
                 showView('login');
            }
        });


        // 2. LINE 登入按鈕事件
        lineLoginBtn.addEventListener('click', () => {
            // 產生一個隨機字串用於 state 參數，防止 CSRF 攻擊
            const state = generateState();
            // 將 state 存到 localStorage，以便在跳轉回來時驗證
            localStorage.setItem('line_login_state', state);

            // 組合 LINE 登入網址
            const loginUrl = `https://access.line.me/oauth2/v2.1/authorize?` +
                `response_type=code` +
                `&client_id=${LINE_LOGIN_CHANNEL_ID}` +
                `&redirect_uri=${encodeURIComponent(LINE_REDIRECT_URI)}` +
                `&state=${state}` +
                `&scope=profile%20openid%20email`;
            
            // 導向到 LINE 登入頁面
            window.location.href = loginUrl;
        });

        // --- 輔助函式 ---

        // 切換顯示的畫面 (登入/簽到)
        function showView(viewName) {
            loadingSpinner.classList.add('hidden');
            mainContent.classList.remove('hidden');

            loginView.classList.add('hidden');
            checkinView.classList.add('hidden');

            if (viewName === 'login') {
                loginView.classList.remove('hidden');
            } else if (viewName === 'checkin') {
                checkinView.classList.remove('hidden');
            }
        }

        // 產生用於 OAuth state 的隨機字串
        function generateState() {
            const array = new Uint32Array(8);
            window.crypto.getRandomValues(array);
            return Array.from(array, dec => ('0' + dec.toString(16)).substr(-2)).join('');
        }

    </script>
</body>
</html>
