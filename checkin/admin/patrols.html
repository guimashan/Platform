<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 - 巡邏點管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .modal { display: none; }
        .modal.is-open { display: flex; }
    </style>
</head>
<body class="bg-gray-100">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white p-4 hidden md:block">
            <h1 class="text-2xl font-bold mb-8">管理系統</h1>
            <nav>
                <ul>
                    <li class="mb-4"><a href="index.html" class="flex items-center p-2 rounded hover:bg-gray-700"><i class="fas fa-chart-line w-6 mr-2"></i>簽到記錄</a></li>
                    <li class="mb-4"><a href="patrols.html" class="flex items-center p-2 rounded bg-gray-900"><i class="fas fa-map-marked-alt w-6 mr-2"></i>巡邏點管理</a></li>
                    <li class="mb-4"><a href="users.html" class="flex items-center p-2 rounded hover:bg-gray-700"><i class="fas fa-users w-6 mr-2"></i>使用者管理</a></li>
                    <li class="mt-8 border-t border-gray-700 pt-4"><a href="../index.html" class="flex items-center p-2 rounded hover:bg-gray-700"><i class="fas fa-home w-6 mr-2"></i>返回簽到頁</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-8">
            <header class="flex justify-between items-center mb-6">
                <h2 class="text-2xl md:text-3xl font-bold text-gray-800">📍 巡邏點管理</h2>
                <button id="add-patrol-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg flex items-center shadow-md transition-transform duration-200 active:scale-95">
                    <i class="fas fa-plus mr-2"></i>新增巡邏點
                </button>
            </header>

            <div id="patrols-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Patrol cards will be inserted here -->
                <p id="loading-patrols" class="text-gray-500">正在載入巡邏點...</p>
            </div>
        </main>
    </div>

    <!-- Modal for Add/Edit Patrol -->
    <div id="patrol-modal" class="modal fixed inset-0 bg-black bg-opacity-50 items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
            <h3 id="modal-title" class="text-xl font-bold mb-4">新增巡邏點</h3>
            <form id="patrol-form">
                <input type="hidden" id="patrol-id">
                <div class="mb-4">
                    <label for="patrol-name" class="block text-gray-700 text-sm font-bold mb-2">巡邏點名稱</label>
                    <input type="text" id="patrol-name" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label for="patrol-lat" class="block text-gray-700 text-sm font-bold mb-2">緯度 (Latitude)</label>
                        <input type="number" step="any" id="patrol-lat" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700" required>
                    </div>
                    <div>
                        <label for="patrol-lng" class="block text-gray-700 text-sm font-bold mb-2">經度 (Longitude)</label>
                        <input type="number" step="any" id="patrol-lng" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700" required>
                    </div>
                </div>
                <div class="mb-6">
                    <label for="patrol-radius" class="block text-gray-700 text-sm font-bold mb-2">容許誤差 (公尺)</label>
                    <input type="number" id="patrol-radius" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700" required value="30">
                </div>
                <div class="flex items-center justify-end">
                    <button type="button" id="cancel-btn" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded mr-2">取消</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">儲存</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Modal for QR Code -->
    <div id="qrcode-modal" class="modal fixed inset-0 bg-black bg-opacity-50 items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-sm p-6 text-center">
             <h3 class="text-xl font-bold mb-4" id="qrcode-patrol-name">巡邏點 QR Code</h3>
             <div id="qrcode-container" class="p-4 border rounded-lg inline-block"></div>
             <p class="text-sm text-gray-500 my-4">請工作人員掃描此 QR Code 進行簽到。</p>
             <a id="download-qr-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg inline-block" download="qrcode.png">下載圖片</a>
             <button id="close-qr-modal-btn" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg ml-2">關閉</button>
        </div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBYrg7L1tHWkvC4FyrnA7eZRCpi6B6DDs8",
            authDomain: "checkin-29f7f.firebaseapp.com",
            projectId: "checkin-29f7f",
            storageBucket: "checkin-29f7f.appspot.com",
            messagingSenderId: "698452461679",
            appId: "1:698452461679:web:bd99b65066602e0a92e59a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // DOM Elements
        const patrolsList = document.getElementById('patrols-list');
        const loadingPatrols = document.getElementById('loading-patrols');
        const addPatrolBtn = document.getElementById('add-patrol-btn');
        const patrolModal = document.getElementById('patrol-modal');
        const modalTitle = document.getElementById('modal-title');
        const patrolForm = document.getElementById('patrol-form');
        const cancelBtn = document.getElementById('cancel-btn');
        const patrolIdInput = document.getElementById('patrol-id');
        const patrolNameInput = document.getElementById('patrol-name');
        const patrolLatInput = document.getElementById('patrol-lat');
        const patrolLngInput = document.getElementById('patrol-lng');
        const patrolRadiusInput = document.getElementById('patrol-radius');

        const qrcodeModal = document.getElementById('qrcode-modal');
        const qrcodeContainer = document.getElementById('qrcode-container');
        const qrcodePatrolName = document.getElementById('qrcode-patrol-name');
        const downloadQrBtn = document.getElementById('download-qr-btn');
        const closeQrModalBtn = document.getElementById('close-qr-modal-btn');

        // Modal Control
        const openModal = (patrol = null) => {
            patrolForm.reset();
            if (patrol) {
                modalTitle.textContent = '編輯巡邏點';
                patrolIdInput.value = patrol.id;
                patrolNameInput.value = patrol.name || '';
                // Defensive check for location
                patrolLatInput.value = patrol.location ? patrol.location.latitude : '';
                patrolLngInput.value = patrol.location ? patrol.location.longitude : '';
                patrolRadiusInput.value = patrol.radius || 30;
            } else {
                modalTitle.textContent = '新增巡邏點';
                patrolIdInput.value = '';
                patrolRadiusInput.value = 30; // Default value
            }
            patrolModal.classList.add('is-open');
        };
        const closeModal = () => patrolModal.classList.remove('is-open');

        addPatrolBtn.addEventListener('click', () => openModal());
        cancelBtn.addEventListener('click', closeModal);

        // Form Submission
        patrolForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = patrolIdInput.value;
            const patrolData = {
                name: patrolNameInput.value,
                location: {
                    latitude: parseFloat(patrolLatInput.value),
                    longitude: parseFloat(patrolLngInput.value),
                },
                radius: parseInt(patrolRadiusInput.value),
                updatedAt: serverTimestamp()
            };

            try {
                if (id) {
                    await setDoc(doc(db, 'patrols', id), patrolData, { merge: true });
                } else {
                    patrolData.createdAt = serverTimestamp();
                    await addDoc(collection(db, 'patrols'), patrolData);
                }
                closeModal();
            } catch (error) {
                console.error("儲存巡邏點失敗:", error);
                alert("儲存失敗，請檢查網路連線。");
            }
        });

        // Real-time listener for patrols
        onSnapshot(collection(db, 'patrols'), (snapshot) => {
            if (snapshot.empty) {
                patrolsList.innerHTML = '<p class="text-gray-500 col-span-full text-center">尚未建立任何巡邏點。</p>';
                loadingPatrols.style.display = 'none';
                return;
            }
            patrolsList.innerHTML = snapshot.docs.map(doc => {
                const patrol = { id: doc.id, ...doc.data() };
                
                // --- FIX START: Add defensive checks for potentially missing data ---
                const name = patrol.name || '無名稱';
                const latitude = patrol.location ? patrol.location.latitude : '<span class="text-red-500">資料遺失</span>';
                const longitude = patrol.location ? patrol.location.longitude : '<span class="text-red-500">資料遺失</span>';
                const radius = patrol.radius !== undefined ? patrol.radius : 'N/A';
                // --- FIX END ---

                return `
                    <div class="bg-white p-6 rounded-lg shadow-md">
                        <h3 class="text-xl font-bold mb-2">${name}</h3>
                        <div class="text-sm text-gray-600 space-y-1 mb-4">
                            <p><b>緯度:</b> ${latitude}</p>
                            <p><b>經度:</b> ${longitude}</p>
                            <p><b>誤差:</b> ±${radius} 公尺</p>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <button class="show-qr-btn bg-teal-500 hover:bg-teal-600 text-white py-1 px-3 rounded text-sm" data-id="${patrol.id}" data-name="${name}">📱 QR Code</button>
                            <button class="edit-btn bg-yellow-500 hover:bg-yellow-600 text-white py-1 px-3 rounded text-sm" data-id="${patrol.id}">✏️ 編輯</button>
                            <button class="delete-btn bg-red-500 hover:bg-red-600 text-white py-1 px-3 rounded text-sm" data-id="${patrol.id}">🗑️ 刪除</button>
                        </div>
                    </div>
                `;
            }).join('');
            loadingPatrols.style.display = 'none';
        });

        // Event delegation for buttons on cards
        patrolsList.addEventListener('click', async (e) => {
            const target = e.target.closest('button');
            if (!target) return;

            const id = target.dataset.id;
            if (target.classList.contains('delete-btn')) {
                if (confirm('確定要刪除這個巡邏點嗎？此操作無法復原。')) {
                    await deleteDoc(doc(db, 'patrols', id));
                }
            } else if (target.classList.contains('edit-btn')) {
                const patrolRef = doc(db, 'patrols', id);
                const docSnap = await getDoc(patrolRef);
                if (docSnap.exists()) {
                    openModal({ id: docSnap.id, ...docSnap.data() });
                }
            } else if (target.classList.contains('show-qr-btn')) {
                const name = target.dataset.name;
                const checkinUrl = `${window.location.protocol}//${window.location.hostname}/checkin/index.html?patrolId=${id}`;
                const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(checkinUrl)}`;
                
                qrcodePatrolName.textContent = `${name} - QR Code`;
                qrcodeContainer.innerHTML = `<img src="${qrApiUrl}" alt="QR Code for ${name}">`;
                downloadQrBtn.href = qrApiUrl;
                downloadQrBtn.download = `QR_Code_${name}.png`;
                qrcodeModal.classList.add('is-open');
            }
        });
        
        closeQrModalBtn.addEventListener('click', () => qrcodeModal.classList.remove('is-open'));

    </script>
</body>
</html>
