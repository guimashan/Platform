<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 - 使用者管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .modal { display: none; }
        .modal.is-open { display: flex; }
        .table-auto th, .table-auto td { white-space: nowrap; }
    </style>
</head>
<body class="bg-gray-100">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white p-4 hidden md:block">
            <h1 class="text-2xl font-bold mb-8">管理系統</h1>
            <nav>
                <ul>
                    <li class="mb-4"><a href="index.html" class="flex items-center p-2 rounded hover:bg-gray-700"><i class="fas fa-chart-line w-6 mr-2"></i>簽到記錄</a></li>
                    <li class="mb-4"><a href="patrols.html" class="flex items-center p-2 rounded hover:bg-gray-700"><i class="fas fa-map-marked-alt w-6 mr-2"></i>巡邏點管理</a></li>
                    <li class="mb-4"><a href="users.html" class="flex items-center p-2 rounded bg-gray-900"><i class="fas fa-users w-6 mr-2"></i>使用者管理</a></li>
                    <li class="mt-8 border-t border-gray-700 pt-4"><a href="../index.html" class="flex items-center p-2 rounded hover:bg-gray-700"><i class="fas fa-home w-6 mr-2"></i>返回簽到頁</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-8">
            <header class="mb-6">
                <h2 class="text-2xl md:text-3xl font-bold text-gray-800">👥 使用者管理</h2>
            </header>

            <!-- Stats Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-lg shadow-md flex items-center">
                    <div class="bg-blue-100 p-3 rounded-full mr-4"><i class="fas fa-users text-blue-500 text-2xl"></i></div>
                    <div>
                        <p class="text-gray-500 text-sm">總使用者數</p>
                        <p id="total-users" class="text-2xl font-bold">0</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-md flex items-center">
                    <div class="bg-green-100 p-3 rounded-full mr-4"><i class="fas fa-user-shield text-green-500 text-2xl"></i></div>
                    <div>
                        <p class="text-gray-500 text-sm">管理員人數</p>
                        <p id="admin-users" class="text-2xl font-bold">0</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-md flex items-center">
                     <div class="bg-yellow-100 p-3 rounded-full mr-4"><i class="fas fa-user text-yellow-500 text-2xl"></i></div>
                    <div>
                        <p class="text-gray-500 text-sm">一般使用者</p>
                        <p id="general-users" class="text-2xl font-bold">0</p>
                    </div>
                </div>
            </div>

            <!-- Users Table -->
            <div class="bg-white p-6 rounded-lg shadow-md overflow-x-auto">
                 <table class="table-auto w-full text-left">
                    <thead>
                        <tr class="border-b">
                            <th class="p-3">使用者</th>
                            <th class="p-3">角色</th>
                            <th class="p-3 hidden md:table-cell">註冊時間</th>
                            <th class="p-3 hidden lg:table-cell">最後登入</th>
                            <th class="p-3">操作</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr><td colspan="5" class="text-center p-8 text-gray-500">正在檢查登入狀態...</td></tr>
                    </tbody>
                 </table>
            </div>
        </main>
    </div>

    <!-- Modal for Edit Role -->
    <div id="role-modal" class="modal fixed inset-0 bg-black bg-opacity-50 items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-sm p-6">
            <h3 class="text-xl font-bold mb-4">設定角色</h3>
            <p class="mb-4">正在為 <strong id="modal-user-name"></strong> 設定角色。</p>
            <form id="role-form">
                <input type="hidden" id="modal-user-id">
                <div class="mb-6">
                    <label for="role-select" class="block text-gray-700 text-sm font-bold mb-2">選擇新角色</label>
                    <select id="role-select" class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                        <option value="user">工作人員/工作同仁</option>
                        <option value="poweruser">管理者</option>
                        <option value="admin">系統管理員</option>
                        <option value="superadmin">最高系統管理員</option>
                    </select>
                </div>
                <div class="flex items-center justify-end">
                    <button type="button" id="cancel-role-btn" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded mr-2">取消</button>
                    <button type="submit" id="save-role-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">儲存</button>
                </div>
            </form>
        </div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBYrg7L1tHWkvC4FyrnA7eZRCpi6B6DDs8",
            authDomain: "checkin-29f7f.firebaseapp.com",
            projectId: "checkin-29f7f",
            storageBucket: "checkin-29f7f.appspot.com",
            messagingSenderId: "698452461679",
            appId: "1:698452461679:web:bd99b65066602e0a92e59a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // DOM Elements
        const usersTbody = document.getElementById('users-tbody');
        const totalUsersEl = document.getElementById('total-users');
        const adminUsersEl = document.getElementById('admin-users');
        const generalUsersEl = document.getElementById('general-users');
        const roleModal = document.getElementById('role-modal');
        const roleForm = document.getElementById('role-form');
        const modalUserName = document.getElementById('modal-user-name');
        const modalUserId = document.getElementById('modal-user-id');
        const roleSelect = document.getElementById('role-select');
        const cancelRoleBtn = document.getElementById('cancel-role-btn');
        const saveRoleBtn = document.getElementById('save-role-btn');

        let allUsersData = [];
        let currentAdmin = null;

        function mapRoleToChinese(role) {
            const roles = { user: '工作人員/工作同仁', poweruser: '管理者', admin: '系統管理員', superadmin: '最高系統管理員' };
            return roles[role] || '未知角色';
        }

        function formatTimestamp(isoString) {
            if (!isoString) return 'N/A';
            return new Date(isoString).toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\//g, '-');
        }

        function attachUserListener() {
            // Real-time listener for users
            onSnapshot(collection(db, 'users'), (snapshot) => {
                if (snapshot.empty) {
                    usersTbody.innerHTML = '<tr><td colspan="5" class="text-center p-8 text-gray-500">沒有任何使用者資料。</td></tr>';
                    return;
                }
                
                allUsersData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Refresh current admin data from the live list
                const localAdminData = JSON.parse(localStorage.getItem('guimashan_user'));
                if(localAdminData) {
                    currentAdmin = allUsersData.find(u => u.id === localAdminData.userId);
                }


                usersTbody.innerHTML = allUsersData.map(user => {
                    const isCurrentUser = currentAdmin && user.id === currentAdmin.id;
                    const targetIsSuperAdmin = user.role === 'superadmin';
                    const adminIsAdmin = currentAdmin && currentAdmin.role === 'admin';
                    const canEdit = !isCurrentUser && !(adminIsAdmin && targetIsSuperAdmin);

                    return `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-3">
                                <div class="flex items-center">
                                    <img src="${user.pictureUrl || 'https://placehold.co/40x40'}" class="w-10 h-10 rounded-full mr-3">
                                    <span class="font-medium">${user.displayName || '未命名'}</span>
                                </div>
                            </td>
                            <td class="p-3">${mapRoleToChinese(user.role)}</td>
                            <td class="p-3 hidden md:table-cell">${formatTimestamp(user.createdAt)}</td>
                            <td class="p-3 hidden lg:table-cell">${formatTimestamp(user.lastLoginAt)}</td>
                            <td class="p-3">
                                ${canEdit ? `<button class="edit-role-btn bg-yellow-500 hover:bg-yellow-600 text-white text-sm py-1 px-3 rounded" data-userid="${user.id}">設定角色</button>` : `<span class="text-xs text-gray-400">無法編輯</span>`}
                            </td>
                        </tr>
                    `;
                }).join('');

                // Update stats
                const total = allUsersData.length;
                const admins = allUsersData.filter(u => ['poweruser', 'admin', 'superadmin'].includes(u.role)).length;
                totalUsersEl.textContent = total;
                adminUsersEl.textContent = admins;
                generalUsersEl.textContent = total - admins;
            });
        }
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in.
                attachUserListener();
            } else {
                // User is signed out.
                usersTbody.innerHTML = `<tr><td colspan="5" class="text-center p-8 text-gray-500">權限不足或尚未登入。請先從主頁登入。<br><a href="../index.html" class="text-blue-500 underline mt-2 inline-block">點此返回簽到主頁</a></td></tr>`;
                totalUsersEl.textContent = 0;
                adminUsersEl.textContent = 0;
                generalUsersEl.textContent = 0;
            }
        });


        // Modal Control
        function openRoleModal(userId) {
            const user = allUsersData.find(u => u.id === userId);
            if (user) {
                modalUserName.textContent = user.displayName;
                modalUserId.value = user.id;
                roleSelect.value = user.role;
                roleModal.classList.add('is-open');
            }
        }
        function closeRoleModal() {
            roleModal.classList.remove('is-open');
        }

        usersTbody.addEventListener('click', (e) => {
            if (e.target.classList.contains('edit-role-btn')) {
                const userId = e.target.dataset.userid;
                openRoleModal(userId);
            }
        });

        cancelRoleBtn.addEventListener('click', closeRoleModal);

        // Form Submission
        roleForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            saveRoleBtn.disabled = true;
            saveRoleBtn.textContent = '儲存中...';

            const userId = modalUserId.value;
            const newRole = roleSelect.value;
            
            try {
                const userRef = doc(db, 'users', userId);
                await setDoc(userRef, { role: newRole }, { merge: true });
                closeRoleModal();
            } catch (error) {
                console.error("更新角色失敗:", error);
                alert("更新失敗，請檢查網路連線。");
            } finally {
                saveRoleBtn.disabled = false;
                saveRoleBtn.textContent = '儲存';
            }
        });
    </script>
</body>
</html>
